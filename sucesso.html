<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarsGames — Processando pagamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0e;--card:#131318;--green:#00ff55;--mars:#e8421a;--orange:#ff6b2b;--border:#252530;--muted:#555}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
body{background:var(--bg);font-family:'Montserrat',sans-serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:0}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;opacity:0}
.card{position:relative;z-index:1;background:var(--card);border:1px solid rgba(0,255,85,.2);border-radius:24px;padding:48px 40px;width:90%;max-width:480px;text-align:center;animation:fadeUp .6s ease both;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--green),transparent);border-radius:24px 24px 0 0}
.icon-wrap{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px}
.icon-wrap.loading{background:rgba(0,255,85,.1);border:2px solid rgba(0,255,85,.2);animation:pulse 1.5s ease-in-out infinite}
.icon-wrap.success{background:rgba(0,255,85,.1);border:2px solid rgba(0,255,85,.3);animation:checkPop .5s cubic-bezier(.23,1,.32,1) both}
.icon-wrap.error{background:rgba(232,66,26,.1);border:2px solid rgba(232,66,26,.3)}
.spinner{width:36px;height:36px;border:3px solid rgba(0,255,85,.15);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.title{font-family:'Orbitron',sans-serif;font-size:clamp(18px,4vw,24px);font-weight:900;color:#fff;margin-bottom:8px}
.title span{color:var(--green)}
.subtitle{font-size:13px;color:#888;font-weight:600;line-height:1.6;margin-bottom:28px}
.steps{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:24px;text-align:left}
.step{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step-dot{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#555;flex-shrink:0}
.step-text{font-size:13px;color:#555;font-weight:600}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#000}
.step.done .step-text{color:var(--green)}
.step.active .step-dot{border-color:var(--green);color:var(--green)}
.step.active .step-text{color:#ccc}
.pedido-box{background:rgba(0,255,85,.04);border:1px solid rgba(0,255,85,.12);border-radius:12px;padding:16px;margin-bottom:20px;text-align:left;display:none}
.pedido-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.pedido-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.pedido-item:last-child{border-bottom:none}
.pedido-item-img{width:40px;height:40px;border-radius:6px;object-fit:cover;background:#1a1a22;flex-shrink:0}
.pedido-item-nome{font-size:11px;font-weight:700;color:#eee;flex:1}
.pedido-item-val{font-size:12px;font-weight:900;color:var(--green)}
.chave-box{background:rgba(232,66,26,.06);border:1px dashed rgba(232,66,26,.3);border-radius:10px;padding:14px;margin-bottom:16px}
.chave-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.chave-code{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:var(--orange);letter-spacing:1px;word-break:break-all}
.chave-info{font-size:10px;color:#666;margin-top:4px;font-weight:600}
.copy-btn{padding:4px 12px;border-radius:6px;background:var(--orange);border:none;color:#000;font-weight:900;font-size:10px;cursor:pointer;margin-top:8px}
.pts-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,255,85,.08);border:1px solid rgba(0,255,85,.2);border-radius:99px;padding:6px 16px;font-size:11px;font-weight:900;color:var(--green);margin-bottom:20px;display:none}
.btns{display:flex;flex-direction:column;gap:10px}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#00cc44);color:#000;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:box-shadow .2s}
.btn-primary:hover{box-shadow:0 0 24px rgba(0,255,85,.4)}
.btn-secondary{display:flex;align-items:center;justify-content:center;padding:12px;border-radius:10px;background:transparent;border:1px solid var(--border);color:#888;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s}
.btn-secondary:hover{border-color:#555;color:#fff}
</style>
</head>
<body>
<div class="confetti-wrap" id="confettiWrap"></div>
<div class="card" id="card">
  <div class="icon-wrap loading" id="iconWrap"><div class="spinner"></div></div>
  <div class="title" id="titulo">Processando <span>pagamento</span></div>
  <div class="subtitle" id="subtitulo">Aguardando confirmação do Mercado Pago...<br>Isso pode levar alguns segundos.</div>

  <div class="steps" id="stepsBox">
    <div class="step done" id="s1"><div class="step-dot">✓</div><div class="step-text">Pagamento enviado</div></div>
    <div class="step active" id="s2"><div class="step-dot">2</div><div class="step-text">Confirmando pagamento</div></div>
    <div class="step" id="s3"><div class="step-dot">3</div><div class="step-text">Entregando sua chave</div></div>
  </div>

  <div class="pedido-box" id="pedidoBox">
    <div class="pedido-label">Seus jogos</div>
    <div id="pedidoItens"></div>
  </div>

  <div id="chaveSection"></div>

  <div class="pts-badge" id="ptsBadge">⭐ <span id="ptsGanhos">0</span> MarsPoints ganhos!</div>

  <div class="btns" id="btns" style="display:none">
    <a class="btn-primary" href="perfil.html">🎮 Ver meus pedidos</a>
    <a class="btn-secondary" href="index.html">Continuar comprando</a>
  </div>
</div>
<script>
var SUPABASE_URL='https://rzjtlghpsygxkivgwgws.supabase.co';
var SUPABASE_KEY='sb_publishable_sDCnL56QQzg976Pt9if_GA_2mZn2Wzm';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function lancarConfetti(){
  var wrap=document.getElementById('confettiWrap');
  var cores=['#00ff55','#e8421a','#ffb300','#7b61ff','#00ffff','#fff'];
  for(var i=0;i<60;i++){
    var el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText='left:'+Math.random()*100+'%;top:-20px;background:'+cores[Math.floor(Math.random()*cores.length)]+';animation:confetti '+(2+Math.random()*3)+'s ease-in '+(Math.random()*2)+'s forwards;transform:rotate('+Math.random()*360+'deg);width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px';
    wrap.appendChild(el);
  }
}

function mostrarSucesso(pedido){
  lancarConfetti();
  localStorage.removeItem('mg_cart');
  localStorage.removeItem('mg_cart_saved');

  document.getElementById('iconWrap').className='icon-wrap success';
  document.getElementById('iconWrap').textContent='✅';
  document.getElementById('titulo').innerHTML='Pagamento <span style="color:var(--green)">Confirmado!</span>';
  document.getElementById('subtitulo').textContent='Sua compra foi processada com sucesso. Obrigado por escolher a MarsGames!';
  document.getElementById('stepsBox').style.display='none';
  document.getElementById('btns').style.display='flex';

  // Itens do pedido
  var itens=pedido.itens||[];
  if(itens.length>0){
    var box=document.getElementById('pedidoBox');
    box.style.display='block';
    document.getElementById('pedidoItens').innerHTML=itens.map(function(i){
      return '<div class="pedido-item">'
        +(i.imagem?'<img class="pedido-item-img" src="'+esc(i.imagem)+'" alt="">':'<div class="pedido-item-img"></div>')
        +'<div class="pedido-item-nome">'+esc(i.nome||'Jogo')+'</div>'
        +'<div class="pedido-item-val">R$ '+Number(i.preco||0).toFixed(2).replace('.',',')+'</div>'
        +'</div>';
    }).join('');
  }

  // Chaves entregues
  var chaves=pedido.chaves_entregues||[];
  var chaveSec=document.getElementById('chaveSection');
  if(chaves.length>0){
    chaveSec.innerHTML=chaves.map(function(c){
      if(c.tipo==='erro'||c.conteudo==='ERRO_ESTOQUE'){
        return '<div class="chave-box"><div class="chave-label">⚠️ '+esc(c.produto_nome)+'</div>'
          +'<div class="chave-code" style="color:#888;font-size:11px">Entrega em processamento. Verifique em Meus Pedidos em instantes.</div></div>';
      }
      var corpo='';
      if(c.tipo==='login_senha'){
        var p=(c.conteudo||'').split('|');
        corpo='<div style="margin-bottom:6px"><div style="font-size:9px;color:#666;margin-bottom:2px">Login:</div>'
          +'<div class="chave-code">'+esc(p[0]||'')+'</div></div>'
          +'<div><div style="font-size:9px;color:#666;margin-bottom:2px">Senha:</div>'
          +'<div class="chave-code">'+esc(p[1]||'')+'</div></div>';
      } else {
        corpo='<div class="chave-code">'+esc(c.conteudo||'')+'</div>';
      }
      return '<div class="chave-box">'
        +'<div class="chave-label">🔑 '+esc(c.produto_nome||'Chave')+'</div>'
        +corpo
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">'
        +'<div class="chave-info">Anote ou copie sua chave!</div>'
        +'<button class="copy-btn" onclick="copiar(\''+esc(c.conteudo||'')+'\',this)">Copiar</button>'
        +'</div></div>';
    }).join('');
  } else {
    chaveSec.innerHTML='<div class="chave-box"><div class="chave-label">Chave</div>'
      +'<div class="chave-code" style="color:#888;font-size:11px">Disponível em Meus Pedidos.</div></div>';
  }

  // MarsPoints
  var pts=Math.floor(Number(pedido.valor||0)*10);
  if(pts>0){
    var badge=document.getElementById('ptsBadge');
    badge.style.display='inline-flex';
    document.getElementById('ptsGanhos').textContent=pts.toLocaleString('pt-BR');
  }
}

function mostrarErro(){
  document.getElementById('iconWrap').className='icon-wrap error';
  document.getElementById('iconWrap').textContent='⏳';
  document.getElementById('titulo').innerHTML='Pagamento <span style="color:var(--orange)">em análise</span>';
  document.getElementById('subtitulo').textContent='O Mercado Pago ainda está processando. Sua chave aparecerá em Meus Pedidos assim que confirmado.';
  document.getElementById('stepsBox').style.display='none';
  document.getElementById('btns').style.display='flex';
}

function copiar(texto,btn){
  navigator.clipboard.writeText(texto).then(function(){
    btn.textContent='✓ Copiado';
    setTimeout(function(){btn.textContent='Copiar'},2000);
  });
}

async function init(){
  var urlParams=new URLSearchParams(window.location.search);
  var ref=urlParams.get('ref')||sessionStorage.getItem('mg_external_ref');

  if(!ref){
    mostrarErro();
    return;
  }

  // Persiste o ref para caso o usuário recarregue a página
  sessionStorage.setItem('mg_external_ref', ref);

  var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
    auth:{flowType:'implicit',detectSessionInUrl:true,persistSession:true,autoRefreshToken:true,storageKey:'mg_auth'}
  });

  var tentativas=0;
  var maxTentativas=30; // 30 x 3s = 90s

  async function verificar(){
    tentativas++;
    try {
      var res=await sb.from('pedidos').select('*').eq('reference',ref).maybeSingle();
      var pedido=res.data;

      if(pedido && (pedido.status==='aprovado'||pedido.status==='pago')){
        // Atualiza steps
        document.getElementById('s2').className='step done';
        document.getElementById('s2').querySelector('.step-dot').textContent='✓';
        document.getElementById('s3').className='step done';
        document.getElementById('s3').querySelector('.step-dot').textContent='✓';
        setTimeout(function(){mostrarSucesso(pedido)},500);
        return;
      }

      // Pedido existe mas ainda pendente
      if(pedido && pedido.status==='pendente'){
        document.getElementById('subtitulo').textContent='Pagamento recebido, entregando sua chave...';
        document.getElementById('s2').className='step done';
        document.getElementById('s2').querySelector('.step-dot').textContent='✓';
        document.getElementById('s3').className='step active';
      }

    } catch(e){ console.error(e); }

    if(tentativas<maxTentativas){
      setTimeout(verificar,3000);
    } else {
      mostrarErro();
    }
  }

  verificar();
}

init();
</script>
</body>
</html>
