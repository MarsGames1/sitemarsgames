<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarsGames — Pagamento Confirmado!</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0e;--card:#131318;--green:#00ff55;--mars:#e8421a;--orange:#ff6b2b;--border:#252530;--muted:#555}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.05)}}
body{background:var(--bg);font-family:'Montserrat',sans-serif;color:#fff;min-height:100vh;
  display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}

/* Confetti */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:0}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;opacity:0}

/* Card */
.card{
  position:relative;z-index:1;
  background:var(--card);border:1px solid rgba(0,255,85,.2);
  border-radius:24px;padding:48px 40px;width:90%;max-width:480px;
  text-align:center;animation:fadeUp .6s ease both;
  box-shadow:0 32px 80px rgba(0,0,0,.7);
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--green),transparent);
  border-radius:24px 24px 0 0;
}

/* Check */
.check-wrap{
  width:80px;height:80px;border-radius:50%;
  background:rgba(0,255,85,.1);border:2px solid rgba(0,255,85,.3);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;animation:checkPop .5s cubic-bezier(.23,1,.32,1) .3s both;
}
.check-icon{font-size:36px}

.title{
  font-family:'Orbitron',sans-serif;font-size:clamp(20px,4vw,26px);
  font-weight:900;color:#fff;margin-bottom:8px;
}
.title span{color:var(--green)}
.subtitle{font-size:13px;color:#888;font-weight:600;line-height:1.6;margin-bottom:28px}

/* Pedido info */
.pedido-box{
  background:rgba(0,255,85,.04);border:1px solid rgba(0,255,85,.12);
  border-radius:12px;padding:16px;margin-bottom:24px;
  text-align:left;
}
.pedido-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.pedido-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.pedido-item:last-child{border-bottom:none}
.pedido-item-img{width:40px;height:40px;border-radius:6px;object-fit:cover;background:#1a1a22;flex-shrink:0}
.pedido-item-nome{font-size:11px;font-weight:700;color:#eee;flex:1}
.pedido-item-val{font-size:12px;font-weight:900;color:var(--green)}

/* Chave */
.chave-box{
  background:rgba(232,66,26,.06);border:1px dashed rgba(232,66,26,.3);
  border-radius:10px;padding:14px;margin-bottom:20px;
}
.chave-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.chave-code{
  font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;
  color:var(--orange);letter-spacing:2px;word-break:break-all;
}
.chave-info{font-size:10px;color:#666;margin-top:4px;font-weight:600}

/* Loading chave */
.chave-loading{
  display:flex;align-items:center;gap:8px;justify-content:center;
  font-size:11px;color:var(--muted);font-weight:600;padding:8px 0;
}
.spin{width:16px;height:16px;border:2px solid rgba(232,66,26,.2);border-top-color:var(--mars);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pontos */
.pts-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,255,85,.08);border:1px solid rgba(0,255,85,.2);
  border-radius:99px;padding:6px 16px;
  font-size:11px;font-weight:900;color:var(--green);
  margin-bottom:24px;animation:pulse 2s ease-in-out infinite;
}

/* Botões */
.btns{display:flex;flex-direction:column;gap:10px}
.btn-primary{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--green),#00cc44);
  color:#000;font-family:'Montserrat',sans-serif;
  font-size:12px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;text-decoration:none;transition:box-shadow .2s;
}
.btn-primary:hover{box-shadow:0 0 24px rgba(0,255,85,.4)}
.btn-secondary{
  display:flex;align-items:center;justify-content:center;
  padding:12px;border-radius:10px;
  background:transparent;border:1px solid var(--border);
  color:#888;font-family:'Montserrat',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s;
}
.btn-secondary:hover{border-color:#555;color:#fff}
</style>
</head>
<body>

<div class="confetti-wrap" id="confettiWrap"></div>

<div class="card">
  <div class="check-wrap">
    <div class="check-icon">✅</div>
  </div>
  <div class="title">Pagamento <span>Confirmado!</span></div>
  <div class="subtitle">Sua compra foi processada com sucesso.<br>Obrigado por escolher a MarsGames!</div>

  <div class="pedido-box" id="pedidoBox" style="display:none">
    <div class="pedido-label">Seus jogos</div>
    <div id="pedidoItens"></div>
  </div>

  <div id="chaveSection"></div>

  <div class="pts-badge" id="ptsBadge" style="display:none">
    ⭐ <span id="ptsGanhos">0</span> MarsPoints ganhos!
  </div>

  <div class="btns">
    <a class="btn-primary" href="perfil.html">
      🎮 Ver meus pedidos
    </a>
    <a class="btn-secondary" href="index.html">
      Continuar comprando
    </a>
  </div>
</div>

<script>
var SUPABASE_URL='https://rzjtlghpsygxkivgwgws.supabase.co';
var SUPABASE_KEY='sb_publishable_sDCnL56QQzg976Pt9if_GA_2mZn2Wzm';

// Confetti
function lancarConfetti(){
  var wrap=document.getElementById('confettiWrap');
  var cores=['#00ff55','#e8421a','#ffb300','#7b61ff','#00ffff','#fff'];
  for(var i=0;i<60;i++){
    var el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=[
      'left:'+Math.random()*100+'%',
      'top:-20px',
      'background:'+cores[Math.floor(Math.random()*cores.length)],
      'animation:confetti '+(2+Math.random()*3)+'s ease-in '+(Math.random()*2)+'s forwards',
      'transform:rotate('+Math.random()*360+'deg)',
      'width:'+(6+Math.random()*8)+'px',
      'height:'+(6+Math.random()*8)+'px',
    ].join(';');
    wrap.appendChild(el);
  }
}

// Buscar pedido recente
async function init(){
  lancarConfetti();

  // Limpar carrinho
  localStorage.removeItem('mg_cart');
  localStorage.removeItem('mg_cart_saved');

  if(typeof window.supabase==='undefined'){
    setTimeout(init,100);return;
  }

  var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  var{data:{session}}=await sb.auth.getSession();

  if(!session)return;

  // Mostrar loading enquanto aguarda webhook
  var chaveSection=document.getElementById('chaveSection');
  chaveSection.innerHTML='<div class="chave-loading"><div class="spin"></div> Processando seu pedido...</div>';

  // Polling — aguarda webhook processar (max 30s)
  var tentativas=0;
  var maxTentativas=15;
  var intervalo=setInterval(async function(){
    tentativas++;
    var{data:pedidos}=await sb.from('pedidos')
      .select('*')
      .or('cliente_email.eq.'+session.user.email+',user_id.eq.'+session.user.id)
      .eq('status','pago')
      .order('created_at',{ascending:false})
      .limit(5);

    // Verificar pedidos dos últimos 15 minutos
    var agora=Date.now();
    var recentes=pedidos?pedidos.filter(function(p){
      return agora-new Date(p.created_at).getTime()<15*60*1000;
    }):[];

    if(recentes.length>0){
      clearInterval(intervalo);
      chaveSection.innerHTML='';
      mostrarPedidos(recentes);
    } else if(tentativas>=maxTentativas){
      clearInterval(intervalo);
      chaveSection.innerHTML=
        '<div style="text-align:center;padding:16px;font-size:11px;color:#888;font-weight:600">'+
        'Pagamento recebido! Sua chave chegará em breve no seu perfil.'+
        '</div>';
    }
  },2000);
}

function mostrarPedidos(pedidos){
  // Mostrar jogos
  var box=document.getElementById('pedidoBox');
  var itens=document.getElementById('pedidoItens');
  box.style.display='block';

  var totalPts=0;
  itens.innerHTML=pedidos.map(function(p){
    totalPts+=Math.floor(Number(p.valor||0)*10);
    return '<div class="pedido-item">'+
      (p.produto_img?'<img class="pedido-item-img" src="'+p.produto_img+'" alt="">':'<div class="pedido-item-img"></div>')+
      '<div class="pedido-item-nome">'+esc(p.produto_nome||'Jogo')+'</div>'+
      '<div class="pedido-item-val">R$ '+Number(p.valor||0).toFixed(2).replace('.',',')+'</div>'+
    '</div>';
  }).join('');

  // Mostrar chaves
  var chavesSec=document.getElementById('chaveSection');
  var chaves=pedidos.filter(function(p){return p.key_entregue});
  if(chaves.length>0){
    chavesSec.innerHTML=chaves.map(function(p){
      return '<div class="chave-box">'+
        '<div class="chave-label">🔑 Chave — '+esc(p.produto_nome)+'</div>'+
        '<div class="chave-code">'+esc(p.key_entregue)+'</div>'+
        '<div class="chave-info">Anote ou copie sua chave agora!</div>'+
      '</div>';
    }).join('');
  }

  // Mostrar pontos
  if(totalPts>0){
    document.getElementById('ptsBadge').style.display='inline-flex';
    document.getElementById('ptsGanhos').textContent=totalPts.toLocaleString('pt-BR');
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

init();
</script>
</body>
</html>
