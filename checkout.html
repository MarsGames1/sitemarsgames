<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#00ff55;--g2:#00cc44;--blue:#5b9af6;--mars:#e8421a;--card:#0f0f18;--border:rgba(255,255,255,.08);}
body{background:#08080f;color:#fff;font-family:'Montserrat',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 40px;-webkit-tap-highlight-color:transparent;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,255,85,.04),transparent);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.wrap{position:relative;z-index:1;width:100%;max-width:400px;animation:fadeUp .35s ease both;}

/* ─── SEÇÕES ─── */
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;}
.section-head{padding:12px 16px 0;display:flex;align-items:center;gap:8px;}
.section-num{width:20px;height:20px;border-radius:50%;background:rgba(0,255,85,.12);border:1px solid rgba(0,255,85,.25);font-size:9px;font-weight:900;color:var(--g);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.section-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#444;}
.section-body{padding:12px 16px 14px;}

/* ─── LOGO ─── */
.logo-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;}
.logo span{color:var(--g)}
.secure-badge{font-size:9px;color:#2a2a3a;font-weight:700;display:flex;align-items:center;gap:4px;}

/* ─── ITENS ─── */
.item-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.item-row:last-of-type{border-bottom:none}
.item-img{width:32px;height:32px;border-radius:7px;object-fit:cover;background:#1a1a28;flex-shrink:0;}
.item-nome{flex:1;font-size:11px;font-weight:700;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-preco{font-size:11px;font-weight:900;color:var(--g);}
.total-row{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px;border-top:1px solid rgba(255,255,255,.07);}
.total-lbl{font-size:9px;font-weight:700;color:#444;letter-spacing:1px;text-transform:uppercase;}
.total-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--g);}

/* ─── CUPOM ─── */
.cupom-row{display:flex;gap:7px;}
.cupom-in{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 12px;color:#fff;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;outline:none;transition:border-color .2s;}
.cupom-in:focus{border-color:rgba(232,66,26,.5);}
.cupom-in::placeholder{color:#2a2a3a;}
.cupom-btn{padding:9px 14px;border-radius:9px;border:1px solid rgba(232,66,26,.3);background:rgba(232,66,26,.08);color:#e8421a;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:900;cursor:pointer;transition:background .2s;white-space:nowrap;}
.cupom-btn:hover{background:rgba(232,66,26,.18);}
.cupom-st{display:none;font-size:10px;font-weight:700;padding:5px 9px;border-radius:7px;margin-top:7px;}
.cupom-st.ok{background:rgba(0,255,85,.07);border:1px solid rgba(0,255,85,.2);color:var(--g);}
.cupom-st.er{background:rgba(232,66,26,.07);border:1px solid rgba(232,66,26,.2);color:#ff7050;}
.desc-row{display:none;justify-content:space-between;align-items:center;margin-top:8px;}
.desc-lbl{font-size:10px;font-weight:700;color:var(--g);}
.desc-val{font-size:12px;font-weight:900;color:var(--g);}

/* ─── MÉTODOS ─── */
.metodos-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.metodo{display:flex;flex-direction:column;align-items:center;gap:6px;padding:13px 8px;border:1.5px solid rgba(255,255,255,.07);border-radius:12px;cursor:pointer;transition:all .18s;text-align:center;position:relative;}
.metodo:hover{border-color:rgba(255,255,255,.18);}
.metodo.sel-pix{border-color:var(--g);background:rgba(0,255,85,.05);}
.metodo.sel-pix::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--g),transparent);border-radius:12px 12px 0 0;}
.metodo.sel-card{border-color:var(--blue);background:rgba(91,154,246,.05);}
.metodo.sel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);border-radius:12px 12px 0 0;}
.metodo-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.ic-pix{background:rgba(0,255,85,.1);border:1px solid rgba(0,255,85,.2);}
.ic-card{background:rgba(91,154,246,.1);border:1px solid rgba(91,154,246,.2);}
.metodo-nm{font-size:11px;font-weight:900;color:#ddd;line-height:1.2;}
.metodo-ds{font-size:9px;color:#444;font-weight:600;}
.metodo-ck{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.sel-pix .metodo-ck{border-color:var(--g);background:var(--g);}
.sel-card .metodo-ck{border-color:var(--blue);background:var(--blue);}
.metodo-ck::after{content:'';width:5px;height:5px;border-radius:50%;background:#000;transform:scale(0);transition:transform .18s;}
.sel-pix .metodo-ck::after,.sel-card .metodo-ck::after{transform:scale(1);}

/* ─── BRICK ─── */
#brick-area{display:none;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:2px;margin-bottom:10px;overflow:hidden;}
#cardBrick_container{width:100%;}
#cardBrick_container iframe{max-width:100%!important;}

/* ─── BOTÃO ─── */
.btn-pg{width:100%;padding:15px;border-radius:12px;border:none;color:#000;font-family:'Montserrat',sans-serif;font-weight:900;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-top:10px;}
.btn-pix{background:linear-gradient(135deg,var(--g),var(--g2));box-shadow:0 4px 18px rgba(0,255,85,.2);}
.btn-pix:hover:not(:disabled){box-shadow:0 6px 26px rgba(0,255,85,.38);transform:translateY(-1px);}
.btn-card{background:linear-gradient(135deg,#5b9af6,#3a7ae0);box-shadow:0 4px 18px rgba(91,154,246,.2);}
.btn-card:hover:not(:disabled){box-shadow:0 6px 26px rgba(91,154,246,.38);transform:translateY(-1px);}
.btn-pg:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-pg .sp{width:15px;height:15px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.btn-pg.loading .sp{display:block;}
.btn-pg.loading .btxt{display:none;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a1a28;border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:10px 18px;font-size:12px;font-weight:700;color:#eee;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGO -->
  <div class="logo-bar">
    <div class="logo">Mars<span>Games</span></div>
    <div class="secure-badge">🔒 Pagamento seguro</div>
  </div>

  <!-- 1. RESUMO -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">1</div>
      <div class="section-title">Resumo do pedido</div>
    </div>
    <div class="section-body">
      <div id="itensList"></div>
      <div class="total-row">
        <div class="total-lbl">Total</div>
        <div class="total-val" id="totalValor">R$ 0,00</div>
      </div>
    </div>
  </div>

  <!-- 2. CUPOM -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">2</div>
      <div class="section-title">Cupom de desconto</div>
    </div>
    <div class="section-body">
      <div class="cupom-row">
        <input class="cupom-in" id="cupomInput" type="text" placeholder="Código do cupom" maxlength="20" autocomplete="off">
        <button class="cupom-btn" id="cupomBtn" onclick="aplicarCupom()">Aplicar</button>
      </div>
      <div class="cupom-st" id="cupomSt"></div>
      <div class="desc-row" id="descRow">
        <span class="desc-lbl">Desconto <span id="cupomTag" style="background:rgba(0,255,85,.1);border:1px solid rgba(0,255,85,.2);border-radius:4px;padding:1px 5px;font-size:8px;margin-left:4px"></span></span>
        <span class="desc-val" id="descVal"></span>
      </div>
    </div>
  </div>

  <!-- 3. PAGAMENTO -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">3</div>
      <div class="section-title">Forma de pagamento</div>
    </div>
    <div class="section-body">
      <div class="metodos-grid" style="margin-bottom:12px;">
        <div class="metodo sel-pix" id="metodo-pix" onclick="selecionarMetodo('pix')">
          <div class="metodo-ic ic-pix">⚡</div>
          <div class="metodo-nm">Pix</div>
          <div class="metodo-ds">Aprovação instantânea</div>
          <div class="metodo-ck"></div>
        </div>
        <div class="metodo" id="metodo-cartao" onclick="selecionarMetodo('cartao')">
          <div class="metodo-ic ic-card">💳</div>
          <div class="metodo-nm">Cartão</div>
          <div class="metodo-ds">Crédito ou débito</div>
          <div class="metodo-ck"></div>
        </div>
      </div>

      <!-- BRICK -->
      <div id="brick-area">
        <div id="cardBrick_container"></div>
      </div>

      <!-- BOTÃO -->
      <button class="btn-pg btn-pix" id="btnPagar" onclick="pagar()">
        <div class="sp"></div>
        <span class="btxt">⚡ Pagar com Pix</span>
      </button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://rzjtlghpsygxkivgwgws.supabase.co';
const SUPABASE_KEY='sb_publishable_sDCnL56QQzg976Pt9if_GA_2mZn2Wzm';
const MP_PUBLIC_KEY='APP_USR-3c95def7-e1bc-4f2f-a191-b724ea84f28a';

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{flowType:'implicit',detectSessionInUrl:true,persistSession:true,autoRefreshToken:true,storageKey:'mg_auth'}});

const itens=JSON.parse(sessionStorage.getItem('mg_itens_pendentes')||'[]');
let cupomAtual=null;
try{var _c=sessionStorage.getItem('mg_cupom');if(_c)cupomAtual=JSON.parse(_c);}catch(_){}
let metodoSelecionado='pix';
let mpInstance=null,cardBrickCtrl=null;

/* ── DESCONTO MARSPASS ── */
const MP_PLANOS_DESCONTO={andromeda:3,triangulo:5,centaurus:10,sombrero:15};
let assinaturaAtiva=null;

async function verificarAssinaturaAtiva(){
  try{
    var r=await sb.auth.getSession();
    if(!r.data||!r.data.session)return;
    var email=r.data.session.user.email;
    var{data}=await sb.from('marspass_assinaturas')
      .select('plano,status,data_vencimento')
      .eq('user_email',email)
      .eq('status','ativo')
      .gt('data_vencimento',new Date().toISOString())
      .maybeSingle();
    if(!data)return;
    var pct=MP_PLANOS_DESCONTO[data.plano]||0;
    if(pct<=0)return;
    assinaturaAtiva={plano:data.plano,desconto_pct:pct};
    mostrarBannerAssinatura(data.plano,pct);
    renderResumo();
    if(cardBrickCtrl){cardBrickCtrl.unmount();cardBrickCtrl=null;}
    if(metodoSelecionado==='cartao')await initCardBrick();
  }catch(e){console.warn('[marspass desconto]',e);}
}

function nomeIconePlano(plano){
  var map={andromeda:'🌀 Andrômeda',triangulo:'🔺 Triângulo',centaurus:'⚡ Centaurus',sombrero:'🌐 Sombrero'};
  return map[plano]||plano;
}

function mostrarBannerAssinatura(plano,pct){
  var existente=document.getElementById('banner-marspass');
  if(existente)existente.remove();
  var banner=document.createElement('div');
  banner.id='banner-marspass';
  banner.style.cssText='background:rgba(0,255,85,.07);border:1px solid rgba(0,255,85,.2);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:11px;font-weight:700;color:#00ff55;';
  banner.innerHTML='<span style="font-size:18px">🌌</span><span>MarsPass <strong>'+nomeIconePlano(plano)+'</strong> ativo — <strong>'+pct+'% OFF</strong> aplicado automaticamente!</span>';
  document.querySelector('.wrap').insertBefore(banner,document.querySelector('.section'));
}

/* ── RENDER ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function calcDesc(){
  if(!itens.length)return 0;
  var subtotal=itens.reduce((s,p)=>s+Number(p.preco),0);
  var descAssinatura=assinaturaAtiva?Math.round(subtotal*(assinaturaAtiva.desconto_pct/100)*100)/100:0;
  var descCupom=0;
  if(cupomAtual){
    var menor=Math.min(...itens.map(p=>Number(p.preco)));
    descCupom=cupomAtual.desconto_tipo==='percentual'
      ?Math.round(menor*(cupomAtual.desconto_valor/100)*100)/100
      :Math.min(cupomAtual.desconto_valor,menor);
  }
  return Math.round(Math.max(descAssinatura,descCupom)*100)/100;
}
function getTotal(){return Math.max(0,Math.round((itens.reduce((s,p)=>s+Number(p.preco),0)-calcDesc())*100)/100);}
function fmt(v){return'R$ '+Number(v).toFixed(2).replace('.',',');}

function renderResumo(){
  if(!itens.length){window.location.href='index.html';return;}
  var sub=itens.reduce((s,p)=>s+Number(p.preco),0);
  var desc=calcDesc(),total=Math.max(0,sub-desc);
  document.getElementById('itensList').innerHTML=itens.map(p=>
    '<div class="item-row">'+
    '<img loading="lazy" class="item-img" src="'+esc(p.imagem||'')+'" onerror="this.style.display=\'none\'" alt="">'+
    '<div class="item-nome">'+esc(p.nome)+'</div>'+
    '<div class="item-preco">'+fmt(p.preco)+'</div>'+
    '</div>'
  ).join('');
  document.getElementById('totalValor').textContent=fmt(total);
  var dr=document.getElementById('descRow');
  if(desc>0){
    dr.style.display='flex';
    document.getElementById('descVal').textContent='-'+fmt(desc);
    document.getElementById('cupomTag').textContent=cupomAtual.codigo;
  }else{dr.style.display='none';}
}

/* ── TOAST ── */
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3200);
}

/* ── CUPOM ── */
async function aplicarCupom(){
  var input=document.getElementById('cupomInput');
  var btn=document.getElementById('cupomBtn');
  var st=document.getElementById('cupomSt');
  var codigo=(input.value||'').trim().toUpperCase();
  if(!codigo)return;

  /* Remover cupom já aplicado */
  if(cupomAtual){
    cupomAtual=null;sessionStorage.removeItem('mg_cupom');
    input.value='';btn.textContent='Aplicar';
    st.className='cupom-st';st.style.display='none';
    document.getElementById('descRow').style.display='none';
    renderResumo();return;
  }

  btn.disabled=true;btn.textContent='...';st.style.display='none';
  try{
    var res=await sb.from('cupons').select('*').eq('codigo',codigo).eq('ativo',true).maybeSingle();
    if(res.error||!res.data){erroCupom('Cupom inválido ou expirado.');btn.disabled=false;btn.textContent='Aplicar';return;}
    var cv=res.data;

    /* Verifica validade */
    if(cv.validade&&new Date(cv.validade)<new Date()){erroCupom('Este cupom está expirado.');btn.disabled=false;btn.textContent='Aplicar';return;}

    /* Verifica uso por email */
    var sess=await sb.auth.getSession();
    if(sess.data&&sess.data.session){
      var email=sess.data.session.user.email;
      var usados=Array.isArray(cv.emails_usados)?cv.emails_usados:[];
      if(usados.includes(email)){erroCupom('Cupom já utilizado pela sua conta.');btn.disabled=false;btn.textContent='Aplicar';return;}
    }

    /* Verifica limite de usos */
    if(cv.usos_max&&(cv.usos_atuais||cv.usos||0)>=cv.usos_max){erroCupom('Cupom atingiu o limite de usos.');btn.disabled=false;btn.textContent='Aplicar';return;}

    /* Aplica */
    cupomAtual=cv;sessionStorage.setItem('mg_cupom',JSON.stringify(cv));
    btn.textContent='Remover';btn.disabled=false;
    var descTxt=cv.desconto_tipo==='percentual'?cv.desconto_valor+'% OFF':fmt(cv.desconto_valor)+' OFF';
    st.className='cupom-st ok';st.innerHTML='✓ <strong>'+codigo+'</strong> aplicado — '+descTxt;st.style.display='block';
    renderResumo();
    if(cardBrickCtrl){cardBrickCtrl.unmount();cardBrickCtrl=null;}
    if(metodoSelecionado==='cartao')await initCardBrick();
  }catch(e){erroCupom('Erro ao verificar cupom.');}
  btn.disabled=false;
}

function erroCupom(msg){
  var st=document.getElementById('cupomSt');
  st.className='cupom-st er';st.textContent='✕ '+msg;st.style.display='block';
  setTimeout(()=>st.style.display='none',3500);
}

/* ── MARCAR CUPOM COMO USADO ── */
async function marcarCupomUsado(email){
  if(!cupomAtual||!email)return;
  try{
    var usados=Array.isArray(cupomAtual.emails_usados)?[...cupomAtual.emails_usados]:[];
    if(!usados.includes(email))usados.push(email);
    var novosUsos=(cupomAtual.usos_atuais||cupomAtual.usos||0)+1;
    await sb.from('cupons').update({emails_usados:usados,usos_atuais:novosUsos,usos:novosUsos}).eq('id',cupomAtual.id);
    cupomAtual=null;sessionStorage.removeItem('mg_cupom');
  }catch(e){console.warn('[cupom mark]',e);}
}

/* ── MÉTODO ── */
async function selecionarMetodo(m){
  metodoSelecionado=m;
  document.getElementById('metodo-pix').className='metodo'+(m==='pix'?' sel-pix':'');
  document.getElementById('metodo-cartao').className='metodo'+(m==='cartao'?' sel-card':'');
  var brick=document.getElementById('brick-area');
  var btn=document.getElementById('btnPagar');
  if(m==='cartao'){
    brick.style.display='block';
    btn.style.display='none';  /* Brick tem seu próprio botão */
    await initCardBrick();
  }else{
    brick.style.display='none';
    btn.style.display='';
    btn.className='btn-pg btn-pix';
    btn.querySelector('.btxt').textContent='⚡ Pagar com Pix';
  }
}

/* ── BRICK ── */
async function initCardBrick(){
  if(cardBrickCtrl)return;
  if(!window.MercadoPago){showToast('SDK do cartão não carregou.');return;}
  var total=getTotal();
  if(total<1){
    document.getElementById('brick-area').innerHTML='<div style="padding:16px;text-align:center;font-size:11px;color:#ff8844;font-weight:700">⚠️ Valor mínimo para cartão é R$ 1,00. Use Pix.</div>';
    return;
  }
  if(!mpInstance)mpInstance=new MercadoPago(MP_PUBLIC_KEY,{locale:'pt-BR'});
  var sess=await sb.auth.getSession();
  var email=(sess.data&&sess.data.session&&sess.data.session.user.email)||'';
  try{
    cardBrickCtrl=await mpInstance.bricks().create('cardPayment','cardBrick_container',{
      initialization:{amount:total,payer:{email}},
      customization:{
        visual:{style:{theme:'dark'},hideFormTitle:true},
        paymentMethods:{maxInstallments:12}
      },
      callbacks:{
        onReady:()=>{},
        onSubmit:async(cardData)=>{
          console.log('[Brick RAW]',JSON.stringify(cardData));
          /* Mostra loading no botão do PIX (reutilizado como indicador) */
          var brickArea=document.getElementById('brick-area');
          if(brickArea)brickArea.style.opacity='.5';
          /* O Brick entrega os dados no root ou dentro de formData/data dependendo da versão */
          var fd=cardData&&cardData.formData?cardData.formData:cardData&&cardData.data?cardData.data:cardData;
          /* campos que ficam no root e podem ser perdidos na extração */
          if(!fd.transaction_amount && cardData.transaction_amount) fd.transaction_amount = cardData.transaction_amount;
          if(!fd.cardholder && cardData.cardholder) fd.cardholder = cardData.cardholder;
          console.log('[onSubmit] fd completo=', JSON.stringify(fd));
          await pagarCartao(fd);
          if(brickArea)brickArea.style.opacity='1';
        },
        onError:(err)=>{
          if(err&&err.type==='non_critical')return;
          if(err&&err.cause&&err.cause[0]&&err.cause[0].code==='E301')return;
          showToast('Erro no formulário. Tente novamente.');
          cardBrickCtrl=null;
          var btn=document.getElementById('btnPagar');
          if(btn){btn.disabled=false;btn.classList.remove('loading');}
        }
      }
    });
  }catch(e){showToast('Erro ao carregar cartão. Use Pix.');cardBrickCtrl=null;}
}

/* ── PAGAR ── */
async function pagar(){
  var btn=document.getElementById('btnPagar');
  btn.disabled=true;btn.classList.add('loading');
  if(metodoSelecionado==='cartao'){
    /* O Brick tem seu próprio botão — este código não deve ser atingido */
    btn.disabled=false;btn.classList.remove('loading');
    return;
  }
  /* PIX */
  try{
    var r=await sb.auth.getSession();
    if(!r.data||!r.data.session){showToast('Faça login para continuar.');setTimeout(()=>window.location.href='perfil.html',1200);btn.disabled=false;btn.classList.remove('loading');return;}
    var session=r.data.session;
    var itensDesc=itens.map(p=>({...p,currency_id:'BRL',preco:Math.round(Number(p.preco)*100)/100}));
    var _desc=calcDesc();
    /* Identifica a origem do desconto para passar à edge e ao pix-checkout */
    var _origemDesconto = assinaturaAtiva && !cupomAtual ? 'marspass' : (cupomAtual ? 'cupom' : null);
    if(_desc>0){
      // Aplica o desconto no item de maior preco para nao zerar itens baratos
      var idxM=itensDesc.reduce((bi,p,i)=>Number(p.preco)>Number(itensDesc[bi].preco)?i:bi,0);
      itensDesc[idxM]={...itensDesc[idxM],preco:Math.round(Math.max(0,Number(itensDesc[idxM].preco)-_desc)*100)/100};
    }
    /* Monta payload — desconto_marspass é enviado separado para a edge registrar corretamente */
    var pixPayload = {itens:itensDesc, cupom: cupomAtual||null};
    if(_origemDesconto === 'marspass' && assinaturaAtiva){
      pixPayload.desconto_marspass = {
        plano: assinaturaAtiva.plano,
        desconto_pct: assinaturaAtiva.desconto_pct,
        valor_desconto: _desc
      };
    }
    var resp=await fetch(SUPABASE_URL+'/functions/v1/mp-criar-pix',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body:JSON.stringify(pixPayload)
    });
    var data=await resp.json();
    if(!resp.ok)throw new Error(data.error||'Erro ao gerar Pix');
    sessionStorage.setItem('mg_pix_data',JSON.stringify(data));
    sessionStorage.setItem('mg_external_ref',data.reference||'');
    sessionStorage.setItem('mg_pedido_id',data.pedido_id||'');
    sessionStorage.setItem('mg_user_email',session.user.email||'');
    sessionStorage.setItem('mg_user_id',session.user.id||'');
    sessionStorage.setItem('mg_access_token',session.access_token||'');
    sessionStorage.setItem('mg_refresh_token',session.refresh_token||'');
    /* Salva origem do desconto para o pix-checkout identificar o pedido corretamente */
    if(_origemDesconto) sessionStorage.setItem('mg_desconto_origem', _origemDesconto);
    else sessionStorage.removeItem('mg_desconto_origem');
    /* Salva cupom para marcar como usado após confirmação */
    if(cupomAtual)sessionStorage.setItem('mg_cupom_pix',JSON.stringify({id:cupomAtual.id,email:session.user.email,emails_usados:cupomAtual.emails_usados||[],usos:cupomAtual.usos_atuais||cupomAtual.usos||0}));
    window.location.href='pix-checkout.html';
  }catch(err){showToast('Erro: '+(err.message||'Tente novamente'));btn.disabled=false;btn.classList.remove('loading');}
}

/* ── PAGAR CARTÃO ── */
async function pagarCartao(cardData){
  var btn=document.getElementById('btnPagar');
  btn.disabled=true;btn.classList.add('loading');
  try{
    var r=await sb.auth.getSession();
    if(!r.data||!r.data.session){showToast('Sessão expirada.');btn.disabled=false;btn.classList.remove('loading');return;}
    var session=r.data.session;
    var itensDesc=itens.map(p=>({...p,currency_id:'BRL',preco:Math.round(Number(p.preco)*100)/100}));
    var _desc=calcDesc();
    if(_desc>0){
      var idxM=itensDesc.reduce((bi,p,i)=>Number(p.preco)>Number(itensDesc[bi].preco)?i:bi,0);
      itensDesc[idxM]={...itensDesc[idxM],preco:Math.round(Math.max(0,Number(itensDesc[idxM].preco)-_desc)*100)/100};
    }
    /* Busca nome do titular em todos os lugares possíveis do Brick */
    var _cardholderName=(cardData.cardholder&&cardData.cardholder.name)
      ||(cardData.formData&&cardData.formData.cardholder&&cardData.formData.cardholder.name)
      ||(cardData.additional_info&&cardData.additional_info.payer&&(cardData.additional_info.payer.first_name||''))
      ||'';
    var _cd={
      token:cardData.token||'',
      payment_method_id:cardData.payment_method_id||'',
      installments:Number(cardData.installments)||1,
      payer:cardData.payer||{},
      transaction_amount:cardData.transaction_amount||getTotal()||0
    };
    /* issuer_id: NÃO enviar — o token já carrega essa info e mandar errado causa code 8 */
    /* cardholder: só inclui se tiver nome — MP rejeita com code 8 se vier vazio */
    if(_cardholderName) _cd.cardholder={name:_cardholderName};
    console.log('[pagarCartao] _cd COMPLETO=', JSON.stringify(_cd));
    var resp=await fetch(SUPABASE_URL+'/functions/v1/mp-criar-cartao',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body:JSON.stringify({itens:itensDesc,cupom:cupomAtual||null,cardData:_cd})
    });
    var data=await resp.json();
    if(!resp.ok){console.error('[mp-criar-cartao]',data);throw new Error(data.error||data.message||JSON.stringify(data).slice(0,120));}
    if(data.status==='approved'){
      await marcarCupomUsado(session.user.email);
      sessionStorage.setItem('mg_pedido_id',data.pedido_id||'');
      sessionStorage.setItem('mg_user_email',session.user.email||'');
      const _ch=JSON.parse(sessionStorage.getItem('mg_itens_pendentes')||'[]');
      if(_ch.length&&_ch[0].tipo==='marspoints'){
        showToast('✅ Aprovado! Creditando...');
        await creditarPacoteMPCartao(session).catch(e=>{sessionStorage.setItem('mg_loja_pago','sim');});
        window.location.href='perfil.html#loja-mp';
      }else{window.location.href='sucesso.html';}
    }else if(data.status==='pending'||data.status==='in_process'){
      showToast('Pagamento em análise — verifique seu email.');
      setTimeout(()=>window.location.href='index.html',3000);
    }else{
      var msgs={'cc_rejected_bad_filled_card_number':'Número do cartão incorreto.','cc_rejected_bad_filled_date':'Data de validade incorreta.','cc_rejected_bad_filled_security_code':'CVV incorreto.','cc_rejected_insufficient_amount':'Saldo insuficiente.','cc_rejected_high_risk':'Cartão recusado. Tente outro.','cc_rejected_call_for_authorize':'Ligue ao banco para autorizar.'};
      throw new Error(msgs[data.status_detail]||data.status_detail||'Cartão recusado. Verifique os dados.');
    }
  }catch(err){showToast('❌ '+(err.message||'Tente novamente'));btn.disabled=false;btn.classList.remove('loading');}
}

/* ── CREDITAR LOJA MP (CARTÃO) ── */
async function creditarPacoteMPCartao(session){
  const pkgId=sessionStorage.getItem('mg_loja_pkg_id')||'';
  const pkgMP=parseInt(sessionStorage.getItem('mg_loja_pkg_mp')||'0');
  let itensRaw=[];try{itensRaw=JSON.parse(sessionStorage.getItem('mg_itens_pendentes')||'[]');}catch(e){}
  if(!itensRaw.length||itensRaw[0].tipo!=='marspoints')return false;
  if(sessionStorage.getItem('mg_loja_creditado_cartao'))return true;
  sessionStorage.setItem('mg_loja_creditado_cartao','1');
  const email=session.user.email,token=session.access_token;
  const SU=SUPABASE_URL,SK=SUPABASE_KEY;
  let bonus=[];
  try{bonus=JSON.parse(sessionStorage.getItem('mg_loja_pkg_bonus')||'[]');}catch(e){}
  if(!bonus.length&&itensRaw[0]&&Array.isArray(itensRaw[0].bonus))bonus=itensRaw[0].bonus;
  const hB={'apikey':SK,'Authorization':'Bearer '+token,'Content-Type':'application/json','Accept':'application/json'};
  const hM={...hB,'Prefer':'return=minimal'};
  const erros=[];
  try{
    const mg=await fetch(`${SU}/rest/v1/marspoints?user_email=eq.${encodeURIComponent(email)}&limit=1`,{headers:hB});
    const mr=await mg.json();const ex=mr.length>0;
    const ma=ex?(mr[0].pontos||0):0,hist=ex?(mr[0].historico||[]):[];
    hist.unshift({pontos:pkgMP,descricao:'Compra pacote MP (cartão): '+pkgId,data:new Date().toISOString(),tipo:'compra_mp'});
    const pl={pontos:ma+pkgMP,pontos_historico:Math.max(ma+pkgMP,mr[0]?.pontos_historico||0),historico:hist.slice(0,50)};
    const mw=ex?await fetch(`${SU}/rest/v1/marspoints?user_email=eq.${encodeURIComponent(email)}`,{method:'PATCH',headers:hM,body:JSON.stringify(pl)}):await fetch(`${SU}/rest/v1/marspoints`,{method:'POST',headers:hM,body:JSON.stringify({user_email:email,...pl})});
    if(!mw.ok)throw new Error('MP '+(await mw.text()).slice(0,80));
  }catch(e){erros.push(e.message);}
  try{
    const tb=bonus.filter(b=>b.type==='tkt').reduce((s,b)=>{const m=(b.label||'').match(/\d+/);return s+(m?parseInt(m[0]):0);},0);
    if(tb>0){
      const tg=await fetch(`${SU}/rest/v1/tickets?user_email=eq.${encodeURIComponent(email)}&limit=1`,{headers:hB});
      const tr=await tg.json();const te=tr.length>0;
      const ta=te?(tr[0].quantidade||0):0,tt=te?(tr[0].total_acumulado||0):0;
      const tw=te?await fetch(`${SU}/rest/v1/tickets?user_email=eq.${encodeURIComponent(email)}`,{method:'PATCH',headers:hM,body:JSON.stringify({quantidade:ta+tb,total_acumulado:tt+tb})}):await fetch(`${SU}/rest/v1/tickets`,{method:'POST',headers:hM,body:JSON.stringify({user_email:email,quantidade:tb,total_acumulado:tb,ultima_renovacao:new Date().toISOString()})});
      if(!tw.ok)throw new Error('TKT '+(await tw.text()).slice(0,80));
    }
  }catch(e){erros.push(e.message);}
  try{
    const xb=bonus.filter(b=>b.type==='xp').reduce((s,b)=>{const m=(b.label||'').match(/\d+/);return s+(m?parseInt(m[0]):0);},0);
    if(xb>0){
      const pg=await fetch(`${SU}/rest/v1/planetas?user_email=eq.${encodeURIComponent(email)}&limit=1`,{headers:hB});
      const pr=await pg.json();const pe=pr.length>0;
      const xa=pe?(pr[0].xp||0):0,log=pe?(pr[0].log||[]):[];
      log.unshift({label:'Bônus XP pacote '+pkgId,xp:xb,icon:'🌟',t:new Date().toLocaleTimeString('pt-BR')});
      const pw=pe?await fetch(`${SU}/rest/v1/planetas?user_email=eq.${encodeURIComponent(email)}`,{method:'PATCH',headers:hM,body:JSON.stringify({xp:xa+xb,log:log.slice(0,20),updated_at:new Date().toISOString()})}):await fetch(`${SU}/rest/v1/planetas`,{method:'POST',headers:hM,body:JSON.stringify({user_email:email,xp:xb,log:log.slice(0,20),updated_at:new Date().toISOString()})});
      if(!pw.ok)throw new Error('XP '+(await pw.text()).slice(0,80));
    }
  }catch(e){erros.push(e.message);}
  if(erros.length)sessionStorage.setItem('mg_loja_pago','sim');
  ['mg_loja_pkg_id','mg_loja_pkg_mp','mg_loja_pkg_bonus','mg_itens_pendentes','mg_loja_creditado_cartao'].forEach(k=>sessionStorage.removeItem(k));
  return erros.length===0;
}

renderResumo();
verificarAssinaturaAtiva();
/* Restaura cupom se havia um aplicado */
if(cupomAtual){
  var descTxt=cupomAtual.desconto_tipo==='percentual'?cupomAtual.desconto_valor+'% OFF':fmt(cupomAtual.desconto_valor)+' OFF';
  var st=document.getElementById('cupomSt');
  st.className='cupom-st ok';st.innerHTML='✓ <strong>'+cupomAtual.codigo+'</strong> aplicado — '+descTxt;st.style.display='block';
  document.getElementById('cupomBtn').textContent='Remover';
  document.getElementById('descRow').style.display='flex';
  document.getElementById('descVal').textContent='-'+fmt(calcDesc());
  document.getElementById('cupomTag').textContent=cupomAtual.codigo;
}
</script>
<script>
/* ── Presença de visitante para o admin ── */
(function(){
  var _pc=null,_pi=null,_t=0;
  function _ini(){
    if(typeof sb==='undefined'||!sb){if(_t++<20)setTimeout(_ini,500);return;}
    var em=(typeof userSession!=='undefined'&&userSession&&userSession.user&&userSession.user.email)||null;
    var pg=window.location.pathname.replace(/^\/+/,'').replace('.html','').split('/').pop()||'index';
    var visKey=sessionStorage.getItem('mg_vis_key');
    if(!visKey){visKey='vis_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);sessionStorage.setItem('mg_vis_key',visKey);}
    var displayEmail=em||('anon_'+visKey.slice(-6));
    _pc=sb.channel('site-visitors',{config:{presence:{key:visKey}}});
    _pc.subscribe(function(s){if(s==='SUBSCRIBED')_pc.track({tipo:'visitante',email:displayEmail,pagina:pg,online_at:new Date().toISOString()});});
    _pi=setInterval(function(){if(_pc)_pc.track({tipo:'visitante',email:displayEmail,pagina:pg,online_at:new Date().toISOString()});},25000);
    window.addEventListener('beforeunload',function(){clearInterval(_pi);if(_pc)_pc.untrack();});
  }
  setTimeout(_ini,1500);
})();
</script>
