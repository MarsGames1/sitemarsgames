<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processando pagamento - MarsGames</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070c;color:#fff;font-family:'Montserrat',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,255,85,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,85,.02) 1px,transparent 1px);background-size:48px 48px;z-index:0;}
.card{position:relative;z-index:1;background:#0f0f16;border:1px solid rgba(0,255,85,.12);border-radius:28px;padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.85);}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(to right,transparent,#00ff55,transparent);border-radius:0 0 4px 4px;}
.spinner-wrap{width:72px;height:72px;margin:0 auto 28px;position:relative;}
.s-ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(0,255,85,.08);}
.s-arc{position:absolute;inset:-3px;border-radius:50%;border:3px solid transparent;border-top-color:#00ff55;animation:spin .8s linear infinite;}
.s-icon{position:absolute;inset:10px;border-radius:50%;background:rgba(0,255,85,.07);border:1px solid rgba(0,255,85,.15);display:flex;align-items:center;justify-content:center;font-size:26px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.12)}100%{transform:scale(1)}}
.card{animation:fadeUp .5s ease both}
h1{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;margin-bottom:10px;letter-spacing:.5px;}
.sub{color:#666;font-size:13px;font-weight:600;line-height:1.7;margin-bottom:28px;}
.steps{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 20px;margin-bottom:24px;text-align:left;}
.step{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.step:last-child{border-bottom:none}
.sdot{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid #2a2a3a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#444;transition:all .3s;}
.stxt{font-size:12px;color:#555;font-weight:700;transition:color .3s;}
.step.done .sdot{background:#00ff55;border-color:#00ff55;color:#000;animation:pop .4s ease both}
.step.done .stxt{color:#00ff55}
.step.active .sdot{border-color:#00ff55;color:#00ff55}
.step.active .stxt{color:#ccc}
.btn{display:none;width:100%;padding:15px;border-radius:12px;background:linear-gradient(135deg,#00ff55,#00cc44);border:none;color:#000;font-family:'Montserrat',sans-serif;font-weight:900;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:box-shadow .2s,transform .15s;box-shadow:0 4px 24px rgba(0,255,85,.18);text-align:center;}
.btn:hover{box-shadow:0 8px 32px rgba(0,255,85,.38);transform:translateY(-2px)}
.aviso{display:none;margin-top:14px;padding:10px 14px;background:rgba(255,184,0,.06);border:1px solid rgba(255,184,0,.2);border-radius:8px;font-size:11px;color:#ffb800;line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div class="spinner-wrap">
    <div class="s-ring"></div>
    <div class="s-arc" id="arc"></div>
    <div class="s-icon" id="icon">🔒</div>
  </div>
  <h1 id="titulo">Confirmando pagamento</h1>
  <p class="sub" id="sub">Consultando seu Pix com o banco...</p>
  <div class="steps">
    <div class="step done"   id="s1"><div class="sdot">✓</div><div class="stxt">Pagamento enviado</div></div>
    <div class="step active" id="s2"><div class="sdot">2</div><div class="stxt">Confirmando com o banco</div></div>
    <div class="step"        id="s3"><div class="sdot">3</div><div class="stxt">Entregando sua chave</div></div>
  </div>
  <a class="btn" id="btn" href="#">Ver minha chave →</a>
  <div class="aviso" id="aviso"></div>
</div>

<script>
const SUPA_URL = 'https://rzjtlghpsygxkivgwgws.supabase.co';

// Lê tudo que pode vir na URL
const qp       = new URLSearchParams(window.location.search);
const refUrl   = qp.get('ref');
const extRef   = qp.get('external_reference');
const pixId    = qp.get('payment_id') || qp.get('collection_id');
const savedRef = sessionStorage.getItem('mg_external_ref');
const ref      = refUrl || extRef || savedRef || '';

if (ref) sessionStorage.setItem('mg_external_ref', ref);

console.log('[aguardando]', { refUrl, extRef, pixId, savedRef, ref });

function step(id, s) {
  const el = document.getElementById(id);
  el.className = 'step ' + s;
  if (s === 'done') el.querySelector('.sdot').textContent = '✓';
}

function sucesso(refFinal) {
  step('s2', 'done');
  step('s3', 'done');
  document.getElementById('arc').style.animation = 'none';
  document.getElementById('icon').textContent = '✅';
  document.getElementById('titulo').textContent = 'Confirmado!';
  document.getElementById('sub').textContent = 'Sua chave está pronta. Redirecionando...';
  const r = refFinal || ref;
  sessionStorage.setItem('mg_external_ref', r);
  setTimeout(() => { window.location.href = 'sucesso.html?ref=' + encodeURIComponent(r); }, 1000);
}

function manual(msg) {
  document.getElementById('arc').style.animation = 'none';
  document.getElementById('titulo').textContent = 'Verificação manual';
  document.getElementById('sub').textContent = 'Clique abaixo para ver o status da sua compra.';
  const btn = document.getElementById('btn');
  btn.style.display = 'block';
  btn.href = 'sucesso.html?ref=' + encodeURIComponent(ref);
  if (msg) {
    const av = document.getElementById('aviso');
    av.style.display = 'block';
    av.textContent = msg;
  }
}

let tentativas = 0;
const MAX = 20; // 20 x 3s = 60s máximo

async function confirmar() {
  tentativas++;
  try {
    const r = await fetch(SUPA_URL + '/functions/v1/mp-confirmar-pagamento', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ payment_id: pixId, reference: ref })
    });
    const d = await r.json();
    console.log('[confirmar] tentativa', tentativas, d);

    if (d.aprovado) {
      sucesso(d.reference || ref);
      return;
    }

    if (tentativas >= MAX) {
      manual('O banco ainda está processando. Acesse Meus Pedidos para verificar.');
      return;
    }

    // Ainda pendente — continua tentando
    const msgs = {
      pix_pendente: 'Aguardando confirmação do Pix pelo banco...',
      pedido_nao_encontrado: 'Registrando pedido...',
      sem_dados: 'Registrando pedido...',
      aguardando_pagamento: 'Aguardando Pix...',
    };
    const msg = msgs[d.msg] || 'Verificando...';
    document.getElementById('sub').textContent = msg;

    setTimeout(confirmar, tentativas <= 5 ? 2000 : 3000);

  } catch (e) {
    console.error(e);
    if (tentativas < MAX) setTimeout(confirmar, 4000);
    else manual('Erro de conexão. Verifique sua compra abaixo.');
  }
}

// Sem nenhum dado, manda para perfil
if (!ref && !pixId) {
  manual('');
  document.getElementById('btn').href = 'perfil.html';
  document.getElementById('btn').textContent = 'Ver meus pedidos →';
} else {
  // 1.5s para o banco registrar o pedido criado pela edge function
  setTimeout(confirmar, 1500);
}
</script>
</body>
</html>
