<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processando pagamento - MarsGames</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0e;color:#fff;font-family:'Montserrat',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;}
.card{background:#131318;border:1px solid #252530;border-radius:24px;padding:40px;max-width:420px;width:100%;text-align:center;animation:fadeUp 0.5s ease;box-shadow:0 32px 80px rgba(0,0,0,.7);}
.spinner{width:48px;height:48px;border:4px solid rgba(0,255,85,0.1);border-top-color:#00ff55;border-radius:50%;margin:0 auto 24px;animation:spin 1s linear infinite;}
h1{font-family:'Orbitron',sans-serif;font-size:20px;margin-bottom:16px;}
p{color:#888;font-size:14px;line-height:1.6;margin-bottom:24px;}
.steps{background:rgba(255,255,255,0.03);border:1px solid #252530;border-radius:12px;padding:16px;margin-bottom:24px;text-align:left;}
.step{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #252530;}
.step:last-child{border-bottom:none;}
.step-number{width:24px;height:24px;border-radius:50%;background:rgba(0,255,85,0.1);border:1px solid rgba(0,255,85,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#00ff55;flex-shrink:0;}
.step-text{font-size:13px;color:#ccc;}
.step.completed .step-number{background:#00ff55;color:#000;}
.step.completed .step-text{color:#00ff55;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.check-icon{display:none;margin:0 auto 24px;width:64px;height:64px;background:rgba(0,255,85,0.1);border-radius:50%;align-items:center;justify-content:center;font-size:32px;color:#00ff55;}
.btn{display:inline-flex;padding:14px 28px;border-radius:10px;background:#00ff55;color:#000;font-weight:900;text-decoration:none;text-transform:uppercase;font-size:12px;letter-spacing:1px;transition:box-shadow 0.2s;opacity:0.6;pointer-events:none;}
.btn.active{opacity:1;pointer-events:all;}
.btn.active:hover{box-shadow:0 0 24px rgba(0,255,85,0.4);}
</style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <div class="check-icon" id="checkIcon">✓</div>
  <h1>Aguardando pagamento</h1>
  <p>Assim que o pagamento for confirmado, sua chave aparecerá automaticamente.</p>
  <div class="steps">
    <div class="step completed" id="step1">
      <div class="step-number">1</div>
      <div class="step-text">Pagamento iniciado</div>
    </div>
    <div class="step" id="step2">
      <div class="step-number">2</div>
      <div class="step-text">Processando pagamento</div>
    </div>
    <div class="step" id="step3">
      <div class="step-number">3</div>
      <div class="step-text">Gerando sua chave</div>
    </div>
  </div>
  <a href="sucesso.html" class="btn" id="nextBtn" onclick="redirectToSuccess(event)">Ver minha chave →</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://rzjtlghpsygxkivgwgws.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sDCnL56QQzg976Pt9if_GA_2mZn2Wzm';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {auth:{flowType:'implicit',detectSessionInUrl:true,persistSession:true,autoRefreshToken:true,storageKey:'mg_auth'}});
const reference = sessionStorage.getItem('mg_external_ref');
let checking = true;
let tentativas = 0;
const MAX_TENTATIVAS = 40; // 40 x 3s = 2 minutos

function updateStep(step, status) {
  const el = document.getElementById(step);
  if (status === 'completed') el.classList.add('completed');
}

setTimeout(() => { if (checking) updateStep('step2', 'completed'); }, 3000);

async function verificarPedido() {
  if (!checking || !reference) return;
  tentativas++;

  try {
    const { data } = await sb.from('pedidos').select('status').eq('reference', reference).maybeSingle();

    if (data && (data.status === 'aprovado' || data.status === 'pago')) {
      checking = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('checkIcon').style.display = 'flex';
      updateStep('step2', 'completed');
      updateStep('step3', 'completed');
      setTimeout(() => {
        window.location.href = 'sucesso.html?ref=' + reference;
      }, 800);
      return;
    }
  } catch(e) { console.error(e); }

  if (tentativas < MAX_TENTATIVAS) {
    setTimeout(verificarPedido, 3000);
  } else {
    checking = false;
    const btn = document.getElementById('nextBtn');
    btn.classList.add('active');
    btn.href = 'sucesso.html?ref=' + (reference || '');
    btn.innerHTML = 'Verificar manualmente →';
  }
}

verificarPedido();

function redirectToSuccess(e) {
  e.preventDefault();
  window.location.href = e.target.href;
}
</script>
</body>
</html>
