<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarsGames — Catálogo de Jogos</title>
<meta name="description" content="Catálogo completo de jogos PC Steam com até 90% OFF. Entrega imediata 24h.">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap">
<script>
(function(){
  var _tentativas = 0;
  function _loadSDK(src, fallback){
    var s = document.createElement('script');
    s.src = src;
    s.async = true;
    s.onerror = function(){
      if(fallback){ var s2=document.createElement('script'); s2.src=fallback; s2.async=true; document.head.appendChild(s2); }
    };
    document.head.appendChild(s);
  }
  _loadSDK(
    'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
    'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js'
  );
})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0e;--card:#131318;--surface:#1a1a20;--border:#252530;--border2:#323240;
  --green:#00ff55;--green-glow:rgba(0,255,85,.2);--green-dim:rgba(0,255,85,.07);
  --mars:#e8421a;--mars-dim:rgba(232,66,26,.12);--orange:#ff6b2b;--amber:#ffb300;
  --text:#fff;--muted:#555;--dim:#1a1a22;--radius:12px;--touch:44px;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}

/* ══ ANÉIS DE NÍVEL — versão premium ══ */
@keyframes navBronzeRotate{to{transform:rotate(360deg)}}
@keyframes navBronzeGlow{0%,100%{box-shadow:0 0 6px 2px rgba(180,100,30,.5)}50%{box-shadow:0 0 14px 4px rgba(205,127,50,.9),0 0 26px rgba(205,127,50,.35)}}
@keyframes navPrataRotate{to{transform:rotate(-360deg)}}
@keyframes navPrataGlow{0%,100%{box-shadow:0 0 6px 2px rgba(190,200,220,.4)}33%{box-shadow:0 0 20px 5px rgba(255,255,255,.85),0 0 34px rgba(200,220,255,.4)}66%{box-shadow:0 0 8px 2px rgba(180,195,215,.5)}}
@keyframes navOuroRotate{to{transform:rotate(360deg)}}
@keyframes navOuroGlow{0%,100%{box-shadow:0 0 10px 2px rgba(220,170,0,.55),0 0 20px rgba(255,160,0,.25)}50%{box-shadow:0 0 20px 6px rgba(255,215,0,.95),0 0 38px rgba(255,165,0,.5),0 0 55px rgba(255,120,0,.2)}}
@keyframes navEsmRotate{to{transform:rotate(360deg)}}
@keyframes navEsmRotateRev{to{transform:rotate(-360deg)}}
@keyframes navEsmGlow{0%,100%{box-shadow:0 0 10px 3px rgba(0,200,80,.5),0 0 22px rgba(0,255,100,.2)}50%{box-shadow:0 0 24px 8px rgba(0,255,120,.9),0 0 44px rgba(0,200,80,.5),0 0 66px rgba(0,255,100,.2)}}
@keyframes navDiaRotate{to{transform:rotate(360deg)}}
@keyframes navDiaGlow{0%,100%{box-shadow:0 0 16px rgba(185,242,255,.6),0 0 32px rgba(123,97,255,.35)}50%{box-shadow:0 0 28px rgba(185,242,255,.9),0 0 52px rgba(167,139,250,.6),0 0 72px rgba(0,255,255,.25)}}

.nav-avatar-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-avatar-ring{position:absolute;inset:-3px;border-radius:50%;z-index:0}
.nav-user-avatar{
  width:34px;height:34px;border-radius:50%;
  border:2.5px solid #444;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;cursor:pointer;text-decoration:none;flex-shrink:0;
  position:relative;z-index:1;
  clip-path:circle(50%);-webkit-clip-path:circle(50%);
  background:#131318;
}
.nav-user-avatar img{width:100%;height:100%;object-fit:cover;display:block}
#navAvatarFallback{
  width:100%;height:100%;
  background:linear-gradient(135deg,rgba(232,66,26,.3),rgba(0,255,85,.15));
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:#00ff55;
}
.nav-nivel-bronze .nav-avatar-ring{background:conic-gradient(from 0deg,#5a2e00,#c87820,#f0c060,#cd8030,#f5d080,#b06010,#5a2e00);animation:navBronzeRotate 4s linear infinite}
.nav-nivel-bronze .nav-avatar-ring::before{content:'';position:absolute;inset:2.5px;border-radius:50%;background:#0a0a0e}
.nav-nivel-bronze .nav-user-avatar{border:none!important;animation:navBronzeGlow 3s ease-in-out infinite}
.nav-nivel-prata .nav-avatar-ring{background:conic-gradient(from 0deg,#333,#bbb,#fff,#ccc,#eee,#aaa,#333);animation:navPrataRotate 3s linear infinite}
.nav-nivel-prata .nav-avatar-ring::before{content:'';position:absolute;inset:2.5px;border-radius:50%;background:#0a0a0e}
.nav-nivel-prata .nav-avatar-ring::after{content:'';position:absolute;inset:-5px;border-radius:50%;background:conic-gradient(from 60deg,transparent 65%,rgba(255,255,255,.6) 78%,transparent 90%);animation:navPrataRotate 2s linear infinite reverse}
.nav-nivel-prata .nav-user-avatar{border:none!important;animation:navPrataGlow 2.8s ease-in-out infinite}
.nav-nivel-ouro .nav-avatar-ring{background:conic-gradient(from 0deg,#6a3800,#e8a800,#ffdd00,#ffe880,#ffd000,#c07800,#6a3800);animation:navOuroRotate 2s linear infinite;filter:blur(.3px)}
.nav-nivel-ouro .nav-avatar-ring::before{content:'';position:absolute;inset:2.5px;border-radius:50%;background:#0a0a0e;filter:none}
.nav-nivel-ouro .nav-avatar-ring::after{content:'';position:absolute;inset:-6px;border-radius:50%;background:conic-gradient(from 0deg,transparent 50%,rgba(255,230,80,.7) 62%,rgba(255,255,180,.9) 68%,transparent 78%);animation:navOuroRotate 2.5s linear infinite reverse;filter:blur(.5px)}
.nav-nivel-ouro .nav-user-avatar{border:none!important;animation:navOuroGlow 2s ease-in-out infinite}
.nav-nivel-esmeralda .nav-avatar-ring{background:conic-gradient(from 0deg,#002010,#00aa44,#00ff77,#80ffcc,#00ff88,#009933,#002010);animation:navEsmRotate 1.5s linear infinite;filter:blur(.2px)}
.nav-nivel-esmeralda .nav-avatar-ring::before{content:'';position:absolute;inset:2.5px;border-radius:50%;background:#0a0a0e;filter:none}
.nav-nivel-esmeralda .nav-avatar-ring::after{content:'';position:absolute;inset:-7px;border-radius:50%;background:conic-gradient(from 0deg,transparent 30%,rgba(0,255,100,.6) 46%,rgba(150,255,180,.85) 55%,transparent 68%);animation:navEsmRotateRev 2.2s linear infinite;filter:blur(1px)}
.nav-nivel-esmeralda .nav-user-avatar{border:none!important;animation:navEsmGlow 1.8s ease-in-out infinite}
.nav-nivel-diamante .nav-avatar-ring{background:conic-gradient(from 0deg,#b9f2ff,#a78bfa,#fff,#00ffff,#e0b0ff,#fff,#7b61ff,#b9f2ff);animation:navDiaRotate 2s linear infinite;box-shadow:0 0 16px rgba(185,242,255,.7),0 0 32px rgba(123,97,255,.4)}
.nav-nivel-diamante .nav-avatar-ring::before{content:'';position:absolute;inset:3px;border-radius:50%;background:#0a0a0e;z-index:0}
.nav-nivel-diamante .nav-user-avatar{border:none!important;position:relative;z-index:1;animation:navDiaGlow 2.5s ease-in-out infinite}

html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);font-family:'Montserrat',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
.stars-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(1px 1px at 20% 20%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 40%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 70%,rgba(255,255,255,.3) 0%,transparent 100%);opacity:.6}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:200;background:rgba(10,10,14,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(232,66,26,.15);padding:0 16px;height:64px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;}
.navbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,rgba(232,66,26,.4) 30%,rgba(0,255,85,.25) 70%,transparent)}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.nav-logo-text{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;color:#fff}
.nav-logo-text span{color:var(--mars)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;
  border:1px solid var(--border2);background:rgba(255,255,255,.04);
  font-size:10px;font-weight:700;color:#aaa;letter-spacing:.5px;
  cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s;white-space:nowrap}
.nav-btn:hover{border-color:#555;color:#fff}
.nav-cart-btn{display:flex;align-items:center;justify-content:center;
  min-width:44px;height:44px;border-radius:10px;
  background:linear-gradient(135deg,#00e64d,#00cc44);color:#000;
  cursor:pointer;border:none;position:relative;
  box-shadow:0 4px 14px rgba(0,255,85,.25);transition:box-shadow .2s,transform .15s}
.nav-cart-btn:hover{box-shadow:0 6px 20px rgba(0,255,85,.4);transform:translateY(-1px)}
.nav-cart-btn svg{width:18px;height:18px;fill:none;stroke:#000;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.cart-badge{position:absolute;top:-6px;right:-6px;background:#ff4444;color:#fff;
  width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:900;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}

/* Mobile search button */
.nav-search-btn{
  display:none;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:10px;
  border:1px solid var(--border2);background:rgba(255,255,255,.04);
  cursor:pointer;color:#aaa;transition:border-color .2s,color .2s;flex-shrink:0;
}
.nav-search-btn:hover{border-color:#555;color:#fff}
.nav-search-btn svg{width:16px;height:16px;flex-shrink:0}
@media(max-width:640px){
  .nav-search-btn{display:flex}
  .nav-btn:not(.nav-btn-keep){display:none}
}

/* Mobile search overlay */
.mob-search-overlay{
  position:fixed;top:0;left:0;right:0;z-index:300;
  background:rgba(10,10,14,.98);backdrop-filter:blur(20px);
  padding:12px 16px;border-bottom:1px solid var(--border2);
  display:none;align-items:center;gap:10px;
  animation:fadeUp .2s ease;
}
.mob-search-overlay.open{display:flex}
.mob-search-overlay input{
  flex:1;background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:12px 14px;font-size:14px;color:#fff;
  font-family:'Montserrat',sans-serif;outline:none;
  transition:border-color .2s;
}
.mob-search-overlay input:focus{border-color:rgba(232,66,26,.5)}
.mob-search-overlay input::placeholder{color:#444}
.mob-search-close{
  width:40px;height:40px;border-radius:10px;border:1px solid var(--border2);
  background:transparent;color:#aaa;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* HEADER */
.page-header{position:relative;z-index:1;padding:24px 16px 0;max-width:1280px;margin:0 auto}
@media(min-width:768px){.page-header{padding:40px 32px 0}}
.page-eyebrow{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.page-title{font-family:'Orbitron',sans-serif;font-size:clamp(22px,3.5vw,36px);font-weight:900;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.page-title span{color:var(--green)}

/* FILTROS */
.filters-bar{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  margin-bottom:16px;
}
.filter-search{
  display:flex;align-items:center;gap:0;
  border-radius:10px;border:1px solid var(--border2);
  background:rgba(255,255,255,.03);overflow:hidden;flex:1;min-width:200px;
  transition:border-color .2s;
}
.filter-search:focus-within{border-color:rgba(232,66,26,.4)}
.filter-search input{
  flex:1;background:none;border:none;outline:none;
  padding:12px 14px;font-size:13px;color:#ccc;
  font-family:'Montserrat',sans-serif;
}
.filter-search input::placeholder{color:#444}
.filter-search svg{width:16px;height:16px;flex-shrink:0;color:#444;margin-right:12px}
.filter-count{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;align-self:center}
@media(max-width:640px){
  .filter-search{display:none} /* Substituída pelo overlay mobile */
  .filters-bar{margin-bottom:12px}
  .filter-count{font-size:10px}
  .page-title{margin-bottom:14px}
  .page-eyebrow{display:none}
}

/* Pills de categoria */
.cats-pills{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  margin-bottom:16px;
}
.cats-pills::-webkit-scrollbar{display:none}
.cat-pill{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:99px;
  border:1px solid var(--border);background:var(--card);
  font-size:10px;font-weight:700;color:var(--muted);
  letter-spacing:.5px;cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:border-color .2s,color .2s,background .2s;min-height:36px;
  text-decoration:none;
}
.cat-pill:hover{border-color:var(--border2);color:#aaa}
.cat-pill.active{border-color:var(--mars);color:var(--orange);background:var(--mars-dim)}
@media(max-width:480px){
  .cat-pill{font-size:9px;padding:7px 12px;min-height:34px}
}

/* GRID */
.store-wrap{position:relative;z-index:1;padding:0 12px 80px;max-width:1280px;margin:0 auto}
@media(min-width:768px){.store-wrap{padding:0 32px 80px}}
.prods-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
}
@media(min-width:480px){.prods-grid{grid-template-columns:repeat(2,1fr);gap:12px}}
@media(min-width:640px){.prods-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.prods-grid{grid-template-columns:repeat(4,1fr);gap:14px}}
@media(min-width:1200px){.prods-grid{grid-template-columns:repeat(5,1fr)}}

.prod-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  transition:border-color .25s,box-shadow .25s,transform .2s;
  animation:fadeUp .4s ease both;display:flex;flex-direction:column;position:relative;
  text-decoration:none;
}
@media(hover:hover){
  .prod-card:hover{border-color:rgba(232,66,26,.3);box-shadow:0 8px 40px rgba(0,0,0,.7);transform:translateY(-4px)}
  .prod-card:hover .prod-img{transform:scale(1.06)}
}
.prod-card:active{transform:scale(.98)}
.prod-img-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--dim)}
.prod-img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.prod-tag{position:absolute;top:6px;left:6px;z-index:2;
  font-size:7px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:4px}
.tag-oferta{background:var(--mars);color:#fff}
.tag-key{background:#5865f2;color:#fff}
.tag-combo{background:var(--amber);color:#000}
.tag-esgotado{background:rgba(255,255,255,.08);color:#555;border:1px solid #222}
.prod-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:4px}
.prod-name{font-size:11px;font-weight:700;color:#eee;line-height:1.35;flex:1}
.prod-plat{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.prod-price{font-size:16px;font-weight:900;color:var(--green);margin-top:2px}
.prod-price.esgotado{color:#333}
.prod-btn{
  width:100%;padding:10px;border-radius:8px;border:none;margin-top:6px;
  font-family:'Montserrat',sans-serif;font-size:9px;font-weight:900;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  transition:box-shadow .2s,background .2s;min-height:40px;
}
.prod-btn-buy{background:var(--mars-dim);color:var(--orange);border:1px solid rgba(232,66,26,.3)}
.prod-btn-dis{background:#111;color:#333;cursor:not-allowed;border:1px solid #1a1a1a}
@media(max-width:480px){
  .prod-name{font-size:10px}
  .prod-price{font-size:14px}
  .prod-body{padding:8px}
  .prod-btn{font-size:8px;min-height:36px;padding:8px}
}
.loader-wrap{display:flex;align-items:center;justify-content:center;
  padding:80px;gap:12px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:1px;grid-column:1/-1}
.spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--mars);border-radius:50%;animation:spin .7s linear infinite}
.empty-grid{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:12px;font-weight:600}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--card);border:1px solid rgba(0,255,85,.3);color:var(--green);
  padding:12px 22px;border-radius:8px;font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;pointer-events:none;
  opacity:0;transition:opacity .25s,transform .25s;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Carrinho drawer */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none}
.cart-overlay.open{display:block}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:400px;
  background:var(--card);border-left:1px solid var(--border);z-index:201;
  display:flex;flex-direction:column;transform:translateX(100%);
  transition:transform .35s cubic-bezier(.23,1,.32,1)}
.cart-drawer.open{transform:translateX(0)}

/* ══ ANIMATION ENGINE ══ */
#mars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 2s ease}
#mars-canvas.ready{opacity:1}

/* ══ ANÉIS DE NÍVEL NA NAVBAR ══ */

</style>
</head>
<body>
<div class="stars-bg"></div>

<canvas id="mars-canvas"></canvas>
<nav class="navbar">
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-text">Mars<span>Games</span></div>
  </a>
  <div class="nav-right">
    <!-- Botão de busca mobile -->
    <button class="nav-search-btn" onclick="abrirBuscaMob()" aria-label="Buscar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <a class="nav-btn" href="index.html">Início</a>
    <a class="nav-btn" href="promocoes.html" style="color:var(--orange);border-color:rgba(232,66,26,.3)">Promoções</a>
    <!-- Login / Avatar com anel de nível -->
    <a class="nav-btn nav-btn-keep" href="perfil.html" id="navLogin">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Entrar
    </a>
    <div class="nav-avatar-wrap" id="navAvatarWrap" style="display:none">
      <div class="nav-avatar-ring" id="navAvatarRing"></div>
      <a class="nav-user-avatar" href="perfil.html" id="navUserAvatar" title="Meu perfil">
        <img id="navAvatarImg" src="" alt="" style="display:none">
        <div id="navAvatarFallback"></div>
      </a>
    </div>
    <button class="nav-cart-btn" onclick="toggleCart()">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <div class="cart-badge" id="cartBadge">0</div>
    </button>
  </div>
</nav>

<!-- BUSCA MOBILE OVERLAY -->
<div class="mob-search-overlay" id="mobSearchOverlay">
  <input type="search" id="mobSearchInput" placeholder="Buscar jogo..." oninput="buscar(this.value);document.getElementById('searchInput').value=this.value" autocomplete="off" autofocus>
  <button class="mob-search-close" onclick="fecharBuscaMob()">✕</button>
</div>

<div class="page-header">
  <div class="page-eyebrow">MarsGames — Steam Offline PC</div>
  <h1 class="page-title">Catálogo <span>Completo</span></h1>

  <!-- Filtros -->
  <div class="filters-bar">
    <div class="filter-search">
      <input type="text" id="searchInput" placeholder="Buscar jogo..." oninput="buscar(this.value)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>

<script>
var SUPABASE_URL='https://rzjtlghpsygxkivgwgws.supabase.co';
var SUPABASE_KEY='sb_publishable_sDCnL56QQzg976Pt9if_GA_2mZn2Wzm';
var sb = null;
var _sbTentativas = 0;
function initSupabase(){
  var lib = window.supabase || window.Supabase;
  if(!lib || !lib.createClient){
    _sbTentativas++;
    if(_sbTentativas > 80){ console.error('[MarsGames] SDK Supabase nao carregou em 8s'); return; }
    setTimeout(initSupabase, 100);
    return;
  }
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
    auth:{
      flowType:'implicit',
      detectSessionInUrl:true,
      persistSession:true,
      autoRefreshToken:true,
      storageKey:'mg_auth'
    }
  });
  onSupabaseReady();
}
setTimeout(initSupabase, 50);
var todosProdutos=[],catAtual='todos',buscaAtual='';
var carrinho=JSON.parse(localStorage.getItem('mg_cart')||'[]');
var cupomAtual=null;

async function init(){
  // Verificar se tem categoria na URL
  var params=new URLSearchParams(window.location.search);
  var cat=params.get('cat');
  if(cat){
    catAtual=cat;
    document.querySelectorAll('.cat-pill').forEach(function(p){
      p.classList.toggle('active',p.dataset.cat===cat);
    });
  }

  var{data,error}=await sb.from('produtos').select('*').eq('ativo',true).order('created_at',{ascending:false});
  if(error||!data){
    document.getElementById('prodsGrid').innerHTML='<div class="empty-grid">Erro ao carregar produtos.</div>';
    return;
  }
  todosProdutos=data;
  renderProdutos();
  atualizarCarrinho();

  // Eventos nas pills
  document.querySelectorAll('.cat-pill').forEach(function(pill){
    pill.addEventListener('click',function(){
      catAtual=this.dataset.cat;
      document.querySelectorAll('.cat-pill').forEach(function(p){p.classList.remove('active')});
      this.classList.add('active');
      buscaAtual='';
      document.getElementById('searchInput').value='';
      renderProdutos();
    });
  });
}

function renderProdutos(){
  var lista=todosProdutos.filter(function(p){
    /* Se está buscando por texto, ignora filtro de categoria para mostrar todos os resultados */
    var catOk=buscaAtual?true:(catAtual==='todos'||p.categoria===catAtual);
    var buscaOk=!buscaAtual||(p.nome||'').toLowerCase().includes(buscaAtual.toLowerCase())||
                (p.categoria||'').toLowerCase().includes(buscaAtual.toLowerCase());
    return catOk&&buscaOk;
  });
  document.getElementById('filterCount').textContent=lista.length+' jogo'+(lista.length!==1?'s':'');
  var grid=document.getElementById('prodsGrid');
  if(lista.length===0){
    grid.innerHTML='<div class="empty-grid">🔍 Nenhum jogo encontrado para <strong style="color:#ccc">"'+esc(buscaAtual)+'"</strong>.<br><span style="font-size:10px;margin-top:8px;display:block">Tente outro nome ou verifique a ortografia.</span></div>';
    return;
  }
  grid.innerHTML=lista.map(function(p,i){
    var ok=p.estoque===null||p.estoque===undefined||p.estoque>0;
    var tagClass=!ok?'tag-esgotado':p.categoria==='Combos e Bundles'?'tag-combo':p.categoria==='Steam Key / Outros'?'tag-key':'tag-oferta';
    var tagTxt=!ok?'Esgotado':p.categoria==='Combos e Bundles'?'Bundle':p.categoria==='Steam Key / Outros'?'Key':'Oferta';
    /* Highlight do nome na busca */
    var nomeFinal=esc(p.nome);
    if(buscaAtual){
      var re=new RegExp('('+buscaAtual.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
      nomeFinal=esc(p.nome).replace(re,'<mark style="background:rgba(232,66,26,.35);color:#fff;border-radius:2px;padding:0 1px">$1</mark>');
    }
    return '<a class="prod-card" href="produto.html?id='+p.id+'" style="animation-delay:'+(i%12*.04)+'s">'+
      '<div class="prod-img-wrap">'+
        (p.imagem?'<img class="prod-img" src="'+esc(p.imagem)+'" alt="'+esc(p.nome)+'" loading="lazy">':'')+
        '<div class="prod-tag '+tagClass+'">'+tagTxt+'</div>'+
      '</div>'+
      '<div class="prod-body">'+
        '<div class="prod-name">'+nomeFinal+'</div>'+
        '<div class="prod-plat">'+esc(p.plataforma||'Steam')+'</div>'+
        '<div class="prod-price'+(ok?'':' esgotado')+'">R$ '+Number(p.preco).toFixed(2).replace('.',',')+'</div>'+
        '<button class="prod-btn '+(ok?'prod-btn-buy':'prod-btn-dis')+'" '+(ok?'':'disabled')+
          ' onclick="event.preventDefault();event.stopPropagation();addCarrinho(\''+p.id+'\')">'+(ok?'Comprar agora':'Esgotado')+'</button>'+
      '</div>'+
    '</a>';
  }).join('');
}

/* Timer para debounce do tracking de busca */
var _buscaTimer=null;
var _ultimaBuscaTrackeada='';

function registrarBusca(termo){
  if(!termo||termo.length<2) return;
  if(termo===_ultimaBuscaTrackeada) return;
  _ultimaBuscaTrackeada=termo;
  /* Registra no Supabase sem bloquear a UI */
  try{
    sb.from('buscas_log').insert({
      termo:termo,
      created_at:new Date().toISOString()
    }).then(function(){}).catch(function(){});
  }catch(e){}
}

function buscar(q){
  buscaAtual=q.trim();
  renderProdutos();
  /* Tracking com debounce de 1.2s — só registra quando o usuário parar de digitar */
  clearTimeout(_buscaTimer);
  if(buscaAtual.length>=2){
    _buscaTimer=setTimeout(function(){
      registrarBusca(buscaAtual);
    },1200);
  }
}

function addCarrinho(id){
  var p=todosProdutos.find(function(x){return x.id===id});if(!p)return;
  if(carrinho.find(function(x){return x.id===id})){showToast('Jogo já está no carrinho!');return}
  carrinho.push(p);salvarCarrinho();atualizarCarrinho();
  showToast('✓ '+p.nome.substring(0,28)+' adicionado!');
}
function removerCarrinho(id){carrinho=carrinho.filter(function(x){return x.id!==id});salvarCarrinho();atualizarCarrinho()}
function salvarCarrinho(){localStorage.setItem('mg_cart',JSON.stringify(carrinho))}
function calcularDesconto(){
  if(!cupomAtual||carrinho.length===0) return 0;
  var precos=carrinho.map(function(p){return Number(p.preco)});
  var menor=Math.min.apply(null,precos);
  if(cupomAtual.desconto_tipo==='percentual') return Math.round(menor*(cupomAtual.desconto_valor/100)*100)/100;
  return Math.min(cupomAtual.desconto_valor,menor);
}
function atualizarCarrinho(){
  document.getElementById('cartBadge').textContent=carrinho.length;
  var subtotal=carrinho.reduce(function(s,p){return s+Number(p.preco)},0);
  var desconto=calcularDesconto();
  var total=Math.max(0,subtotal-desconto);
  var rowDesc=document.getElementById('cartDescontoRow');
  if(desconto>0&&cupomAtual){
    rowDesc.style.display='flex';
    document.getElementById('cartCupomTag').textContent=cupomAtual.codigo;
    document.getElementById('cartDescontoVal').textContent='−R$ '+desconto.toFixed(2).replace('.',',');
  } else { rowDesc.style.display='none'; }
  document.getElementById('cartTotal').textContent='R$ '+total.toFixed(2).replace('.',',');
  var btn=document.getElementById('checkoutBtn');
  btn.disabled=carrinho.length===0;btn.style.opacity=carrinho.length===0?'.3':'1';
  var items=document.getElementById('cartItems');
  if(carrinho.length===0){items.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:11px">Carrinho vazio</div>';return}
  var precos=carrinho.map(function(p){return Number(p.preco)});
  var menorPreco=cupomAtual?Math.min.apply(null,precos):null;
  items.innerHTML=carrinho.map(function(p){
    var preco=Number(p.preco);
    var isMenor=cupomAtual&&preco===menorPreco;
    var tag=isMenor?'<span style="font-size:7px;font-weight:900;background:rgba(0,255,85,.12);border:1px solid rgba(0,255,85,.25);color:var(--green);padding:1px 5px;border-radius:3px;margin-left:4px">DESCONTO</span>':'';
    return '<div style="display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--dim);align-items:center">'+
      '<img src="'+esc(p.imagem||'')+'" style="width:44px;height:44px;border-radius:6px;object-fit:cover;flex-shrink:0">'+
      '<div style="flex:1;min-width:0"><div style="font-size:10px;font-weight:700;color:#eee;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.nome)+tag+'</div>'+
      '<div style="font-size:12px;font-weight:900;color:var(--green)">R$ '+preco.toFixed(2).replace('.',',')+'</div></div>'+
      '<button onclick="removerCarrinho(\''+p.id+'\')" style="background:transparent;border:none;color:#333;cursor:pointer;font-size:16px;padding:4px;min-width:28px">✕</button></div>';
  }).join('');
}
async function aplicarCupom(){
  var input=document.getElementById('cartCupomInput');
  var btn=document.getElementById('cartCupomBtn');
  var status=document.getElementById('cartCupomStatus');
  var codigo=(input.value||'').trim().toUpperCase();
  if(!codigo) return;
  if(cupomAtual){
    cupomAtual=null; input.value=''; btn.textContent='Aplicar';
    status.style.cssText='display:flex;font-size:10px;font-weight:700;padding:5px 8px;border-radius:6px;background:rgba(255,255,255,.04);color:#aaa';
    status.textContent='✕ Cupom removido';
    setTimeout(function(){status.style.display='none'},2500);
    atualizarCarrinho(); return;
  }
  btn.disabled=true; btn.textContent='...'; status.style.display='none';
  try{
    var res=await sb.from('cupons').select('*').eq('codigo',codigo).eq('ativo',true).maybeSingle();
    if(res.error||!res.data){ mostrarErroCupom('Cupom inválido ou expirado.'); btn.disabled=false; btn.textContent='Aplicar'; return; }
    var c=res.data;
    var sess=await sb.auth.getSession();
    if(sess.data&&sess.data.session){
      var email=sess.data.session.user.email;
      var emails_usados=Array.isArray(c.emails_usados)?c.emails_usados:[];
      if(emails_usados.includes(email)){ mostrarErroCupom('Este cupom já foi utilizado pela sua conta.'); btn.disabled=false; btn.textContent='Aplicar'; return; }
    }
    if(c.usos_max&&c.usos_atuais>=c.usos_max){ mostrarErroCupom('Este cupom atingiu o limite de usos.'); btn.disabled=false; btn.textContent='Aplicar'; return; }
    cupomAtual=c; btn.textContent='Remover'; btn.disabled=false;
    atualizarCarrinho();
    var desc=c.desconto_tipo==='percentual'?c.desconto_valor+'% OFF':('R$ '+Number(c.desconto_valor).toFixed(2).replace('.',',')+' OFF');
    status.style.cssText='display:flex;font-size:10px;font-weight:700;padding:5px 8px;border-radius:6px;background:rgba(0,255,85,.08);border:1px solid rgba(0,255,85,.2);color:#00ff55';
    status.innerHTML='✓ Cupom <strong>'+codigo+'</strong> aplicado! '+desc;
  }catch(e){ mostrarErroCupom('Erro ao verificar cupom. Tente novamente.'); btn.disabled=false; btn.textContent='Aplicar'; }
}
function mostrarErroCupom(msg){
  var status=document.getElementById('cartCupomStatus');
  status.style.cssText='display:flex;font-size:10px;font-weight:700;padding:5px 8px;border-radius:6px;background:rgba(232,66,26,.08);border:1px solid rgba(232,66,26,.2);color:#ff6b4a';
  status.textContent='✕ '+msg;
  setTimeout(function(){status.style.display='none'},3500);
}
function toggleCart(){
  var o=document.getElementById('cartOverlay');var d=document.getElementById('cartDrawer');
  var open=d.classList.contains('open');
  if(open){o.classList.remove('open');d.classList.remove('open');document.body.style.overflow=''}
  else{o.classList.add('open');d.classList.add('open');document.body.style.overflow='hidden'}
}
async function checkout() {
  if (carrinho.length === 0) return;
  const btn = document.getElementById('checkoutBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Aguarde...'; }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      showToast('Faça login para finalizar a compra!');
      setTimeout(() => window.location.href = 'perfil.html', 1200);
      if (btn) { btn.disabled = false; btn.textContent = 'Finalizar compra'; }
      return;
    }
    const itens = carrinho.map(p => ({ id: p.id, nome: p.nome, preco: Number(p.preco), quantidade: 1, imagem: p.imagem || '' }));
    sessionStorage.setItem('mg_itens_pendentes',  JSON.stringify(itens));
    if(cupomAtual) sessionStorage.setItem('mg_cupom', JSON.stringify(cupomAtual));
    else sessionStorage.removeItem('mg_cupom');
    sessionStorage.setItem('mg_user_email',        session.user.email);
    sessionStorage.setItem('mg_user_id',           session.user.id);
    sessionStorage.setItem('mg_access_token',      session.access_token);
    sessionStorage.setItem('mg_refresh_token',     session.refresh_token || '');
    window.location.href = 'checkout.html';
  } catch (error) {
    console.error('Erro no checkout:', error);
    showToast('Erro: ' + (error.message || 'Tente novamente'));
    if (btn) { btn.disabled = false; btn.textContent = 'Finalizar compra'; }
  }
}
function abrirBuscaMob(){
  var overlay=document.getElementById('mobSearchOverlay');
  overlay.classList.add('open');
  setTimeout(function(){
    var inp=document.getElementById('mobSearchInput');
    if(inp)inp.focus();
  },100);
}
function fecharBuscaMob(){
  var overlay=document.getElementById('mobSearchOverlay');
  overlay.classList.remove('open');
  /* Limpa busca ao fechar */
  var inp=document.getElementById('mobSearchInput');
  if(inp){inp.value='';}
  document.getElementById('searchInput').value='';
  buscaAtual='';
  renderProdutos();
}
/* Fecha com ESC */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') fecharBuscaMob();
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2800)}

function onSupabaseReady(){
  init();
  sb.auth.onAuthStateChange(function(_e,session){atualizarNavbar(session);});
  setTimeout(function(){sb.auth.getSession().then(function(r){atualizarNavbar(r.data?r.data.session:null);});}, 100);
}
</script>
<script>
/* ══ MARSGAMES ANIMATION ENGINE ══ */
(function(){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  var conn=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  if(conn&&(conn.saveData||conn.effectiveType==='2g')) return;

  function loadScript(src,cb){
    var s=document.createElement('script');s.src=src;s.async=true;
    s.onload=cb;s.onerror=function(){if(cb)cb()};document.head.appendChild(s);
  }

  function initThree(){
    if(typeof THREE==='undefined') return;
    var canvas=document.getElementById('mars-canvas');if(!canvas) return;
    var W=window.innerWidth,H=window.innerHeight;
    var renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:false});
    renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));renderer.setSize(W,H);
    var scene=new THREE.Scene();
    var cam=new THREE.PerspectiveCamera(75,W/H,.1,1000);cam.position.z=5;
    var N=W<768?600:1200;
    var pos=new Float32Array(N*3),col=new Float32Array(N*3);
    for(var i=0;i<N;i++){
      pos[i*3]=(Math.random()-.5)*24;pos[i*3+1]=(Math.random()-.5)*24;pos[i*3+2]=(Math.random()-.5)*14;
      var r=Math.random();
      if(r<.05){col[i*3]=.91;col[i*3+1]=.26;col[i*3+2]=.1;}
      else if(r<.09){col[i*3]=0;col[i*3+1]=1;col[i*3+2]=.33;}
      else{var v=Math.random()*.45+.55;col[i*3]=v;col[i*3+1]=v;col[i*3+2]=v;}
    }
    var geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    var sc=document.createElement('canvas');sc.width=sc.height=32;
    var ctx=sc.getContext('2d');
    var g=ctx.createRadialGradient(16,16,0,16,16,16);
    g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.4,'rgba(255,255,255,.8)');g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,32,32);
    var spr=new THREE.CanvasTexture(sc);
    var mat=new THREE.PointsMaterial({size:.08,map:spr,vertexColors:true,transparent:true,opacity:.9,sizeAttenuation:true,depthWrite:false});
    var pts=new THREE.Points(geo,mat);scene.add(pts);
    window.addEventListener('resize',function(){W=window.innerWidth;H=window.innerHeight;cam.aspect=W/H;cam.updateProjectionMatrix();renderer.setSize(W,H);});
    var clock=new THREE.Clock();
    (function animate(){requestAnimationFrame(animate);var t=clock.getElapsedTime();
      pts.rotation.y=t*.012;pts.rotation.x=t*.004;pts.rotation.z=t*.002;
      renderer.render(scene,cam);})();
    canvas.classList.add('ready');
  }

  function initGSAP(){
    if(typeof gsap==='undefined') return;
    if(typeof ScrollTrigger!=='undefined') gsap.registerPlugin(ScrollTrigger);
    function onScroll(sel,from,stagger){
      var els=document.querySelectorAll(sel);if(!els.length)return;
      var base={duration:.65,ease:'power3.out',stagger:stagger||.07};
      if(typeof ScrollTrigger!=='undefined') base.scrollTrigger={trigger:els[0],start:'top 88%',once:true};
      gsap.from(els,Object.assign(base,from));
    }
    gsap.from('.nav-logo',{x:-20,opacity:0,duration:.55,delay:.15,ease:'power2.out'});
    gsap.from('.nav-right > *',{y:-12,opacity:0,duration:.4,stagger:.06,delay:.25});
    onScroll('.prod-card,.jogo-card,.produto-hero',{y:28,opacity:0,scale:.97},.05);
    onScroll('.pstat,.info-card',{y:16,opacity:0,scale:.95},.07);
    onScroll('.cat-card,.filtro-btn',{y:14,opacity:0},.04);
    document.querySelectorAll('.prod-card,.jogo-card,.mv-card').forEach(function(card){
      card.addEventListener('mousemove',function(e){
        var r=card.getBoundingClientRect();
        var x=(e.clientX-r.left-r.width/2)/r.width*7;
        var y=(e.clientY-r.top-r.height/2)/r.height*7;
        gsap.to(card,{rotateY:x,rotateX:-y,duration:.25,ease:'power2.out',transformPerspective:700,overwrite:'auto'});
      });
      card.addEventListener('mouseleave',function(){gsap.to(card,{rotateY:0,rotateX:0,duration:.5,ease:'elastic.out(1,.6)',overwrite:'auto'});});
    });
  }

  function init(){
    if(document.getElementById('mars-canvas')){
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',function(){
        if(window.requestIdleCallback) requestIdleCallback(initThree,{timeout:3000});
        else setTimeout(initThree,800);
      });
    }
    loadScript('https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js',function(){
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js',function(){initGSAP();});
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
  else init();
})();
</script>
<script>
/* ══ ANEL DE NÍVEL NA NAVBAR ══ */
var NAV_NIVEIS=[
  {min:0,nome:'bronze'},{min:100,nome:'prata'},{min:500,nome:'ouro'},
  {min:1000,nome:'esmeralda'},{min:5000,nome:'diamante'}
];
function getNavNivel(pts){
  for(var i=NAV_NIVEIS.length-1;i>=0;i--){
    if(pts>=NAV_NIVEIS[i].min) return NAV_NIVEIS[i].nome;
  }
  return 'bronze';
}
async function atualizarNavbar(session){
  var btnLogin=document.getElementById('navLogin');
  var wrap=document.getElementById('navAvatarWrap');
  var imgAvatar=document.getElementById('navAvatarImg');
  var fallback=document.getElementById('navAvatarFallback');
  if(!wrap) return;
  if(session&&session.user){
    var meta=session.user.user_metadata||{};
    var avatarUrl=meta.avatar_url||meta.picture||'';
    var nome=meta.full_name||meta.name||session.user.email||'';
    var inicial=(nome.trim()[0]||'U').toUpperCase();
    if(btnLogin) btnLogin.style.display='none';
    wrap.style.display='flex';
    if(avatarUrl){
      if(imgAvatar){imgAvatar.src=avatarUrl;imgAvatar.style.display='block';}
      if(fallback) fallback.style.display='none';
    } else {
      if(imgAvatar) imgAvatar.style.display='none';
      if(fallback){fallback.style.display='flex';fallback.textContent=inicial;}
    }
    try{
      var mp=await sb.from('marspoints').select('pontos').eq('user_email',session.user.email).maybeSingle();
      var pts=(mp.data&&mp.data.pontos)||0;
      wrap.className='nav-avatar-wrap nav-nivel-'+getNavNivel(pts);
    }catch(e){wrap.className='nav-avatar-wrap nav-nivel-bronze';}
  } else {
    if(btnLogin) btnLogin.style.display='flex';
    wrap.style.display='none';
  }
}
sb.auth.onAuthStateChange(function(_e,session){atualizarNavbar(session);});
setTimeout(function(){sb.auth.getSession().then(function(r){atualizarNavbar(r.data?r.data.session:null);});}, 100);
</script>

<script>
/* ── Presença de visitante para o admin ── */
(function(){
  var _pc=null,_pi=null,_t=0;
  function _ini(){
    if(typeof sb==='undefined'||!sb){if(_t++<20)setTimeout(_ini,500);return;}
    var em=(typeof userSession!=='undefined'&&userSession&&userSession.user&&userSession.user.email)||'anon_'+Math.random().toString(36).slice(2,8);
    var pg=window.location.pathname.replace(/.*sitemarsgames\//,'').replace('.html','')||'index';
    _pc=sb.channel('site-visitors');
    _pc.subscribe(function(s){if(s==='SUBSCRIBED')_pc.track({tipo:'visitante',email:em,pagina:pg,online_at:new Date().toISOString()});});
    _pi=setInterval(function(){if(_pc)_pc.track({tipo:'visitante',email:em,pagina:pg,online_at:new Date().toISOString()});},25000);
    window.addEventListener('beforeunload',function(){clearInterval(_pi);if(_pc)_pc.untrack();});
  }
  setTimeout(_ini,1500);
})();
</script>
